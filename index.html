<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#C8102E">
<title>Canadian Market — Stock</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#111 !important;min-height:100vh}
:root{--red:#C8102E;--bg:#111;--card:#1e1e1e;--border:#333;--text:#f0f0f0;--muted:#888;--green:#22c55e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#111}

/* Header */
.hdr{background:#1a0508;border-bottom:1px solid #3a0a10;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr h1{font-size:14px;font-weight:700}
.hdr .sub{font-size:10px;opacity:.6;margin-top:1px}
.hdr .ver{font-size:9px;opacity:.35;margin-top:1px}
.dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block}
.dot.off{background:#ef4444}
.btn-sw{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:6px 10px;border-radius:16px;font-size:11px;cursor:pointer}

/* Content */
.content{flex:1;overflow-y:auto;padding:10px;padding-bottom:80px;background:#111}

/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1e1e1e;border-top:1px solid var(--border);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 12px;border:none;background:none;cursor:pointer;position:relative}
.nb .ic{font-size:20px}
.nb .lb{font-size:9px;color:var(--muted);margin-top:2px;font-weight:500}
.nb.active .lb{color:var(--red)}
.nb .bdg{position:absolute;top:4px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:700}

/* Vignettes */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.vig{background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent}
.vig:active{opacity:.75}
.vig-img{width:100%;padding-top:100%;position:relative;background:#1a1a1a;overflow:hidden}
.vig-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vig-img .vig-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px}
.vig-body{padding:5px 6px 7px}
.vig-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vig-qty{font-size:11px;font-weight:800;color:var(--green);margin-top:2px}
.vig-qty.low{color:#fb923c}
.vig-qty.out{color:#f87171}
.vig-badge{position:absolute;top:3px;right:3px;background:#f87171;color:#fff;font-size:7px;padding:1px 4px;border-radius:5px;font-weight:700}
.vig-cart{position:absolute;top:4px;left:4px;background:#000;color:#fff;font-size:12px;padding:3px 7px;border-radius:10px;font-weight:800;min-width:24px;text-align:center;border:1px solid #333}

/* Card */
.card{background:var(--card);border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.card-h{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-h h3{font-size:13px;font-weight:600}
.card-b{padding:10px 14px}

/* Row produit (Rodrigo liste) */
.pr{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #2a2a2a;gap:10px}
.pr:last-child{border-bottom:none}
.pi{width:40px;height:40px;border-radius:8px;background:#2a2a2a;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.pi img{width:100%;height:100%;object-fit:cover}
.pinfo{flex:1;min-width:0}
.pn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pd{font-size:10px;color:var(--muted)}
.qc{display:flex;align-items:center;gap:5px}
.qb{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:#2a2a2a;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.qb:active{background:#3a3a3a}

/* Chip */
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:#2a2a2a;color:var(--muted)}
.chip.low{background:#422006;color:#fb923c}
.chip.ok{background:#14532d;color:#22c55e}
.chip.out{background:#3f0d0d;color:#f87171}

/* Form */
.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:#2a2a2a;color:var(--text);outline:none}
.fi:focus{border-color:var(--red)}
select.fi{appearance:none}

/* Buttons */
.btn{width:100%;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;color:#fff}
.btn:active{opacity:.8}
.btn-red{background:var(--red)}
.btn-blue{background:#1d4ed8}
.btn-out{background:#2a2a2a;color:var(--text);border:1px solid var(--border)}
.btn-green{background:#16a34a}
.btn-sm{width:auto;padding:6px 12px;font-size:12px;margin-bottom:0;border-radius:8px}

/* Search & Dept */
.sb{display:flex;gap:8px;margin-bottom:10px}
.sb input{flex:1;padding:9px 14px;border-radius:12px;border:1px solid var(--border);font-size:13px;background:#2a2a2a;color:var(--text);outline:none}
.ds{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.ds::-webkit-scrollbar{display:none}
.dc{flex-shrink:0;padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:#2a2a2a;font-size:11px;font-weight:500;cursor:pointer;color:var(--text);white-space:nowrap}
.dc.active{background:var(--red);color:#fff;border-color:var(--red)}

/* Alert */
.alert{background:#2a1f00;border:1px solid #5a3e00;border-radius:10px;padding:8px 12px;font-size:12px;color:#fbbf24;margin-bottom:8px}

/* Orders */
.oi{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #2a2a2a;font-size:12px}
.oi:last-child{border-bottom:none}
.oid{text-decoration:line-through;opacity:.4}

/* Tabs */
.tb{display:flex;background:#1a1a1a;border-radius:10px;padding:3px;margin-bottom:10px;border:1px solid var(--border)}
.tbb{flex:1;padding:7px;border:none;background:none;border-radius:8px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer}
.tbb.active{background:#2a2a2a;color:var(--text)}

/* Stat */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sc{background:var(--card);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)}
.sn{font-size:26px;font-weight:800;color:var(--red)}
.sl{font-size:10px;color:var(--muted);margin-top:2px}

/* Loading */
.loading{text-align:center;padding:50px;color:var(--muted)}
.loading::after{content:'';display:block;width:24px;height:24px;border-radius:50%;border:3px solid #333;border-top-color:var(--red);animation:spin .8s linear infinite;margin:12px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.st{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:12px 0 6px}

/* Panel */
.panel-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end}
.panel-ov.show{display:flex}
.panel-box{background:#1e1e1e;width:100%;max-width:480px;margin:0 auto;border-radius:20px 20px 0 0;padding:20px 16px 36px;max-height:80vh;overflow-y:auto;border-top:1px solid var(--border)}
.panel-title{font-size:15px;font-weight:700;margin-bottom:14px;text-align:center}
.mr{display:flex;align-items:center;padding:11px 14px;border-radius:12px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;font-size:13px;font-weight:500;gap:10px;background:#2a2a2a;color:var(--text)}
.mr.active{background:var(--red);color:#fff;border-color:var(--red)}
.mr:active{opacity:.8}

/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:flex-end}
.modal-ov.show{display:flex}
.modal-box{background:#1e1e1e;width:100%;max-width:480px;margin:0 auto;border-radius:20px 20px 0 0;padding:20px 16px 36px;max-height:85vh;overflow-y:auto;border-top:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}

/* Photo */
.photo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}

/* Scan result */
.sr{border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:12px;display:none}
.sr.ok{background:#14532d;color:#86efac;border:1px solid #166534}
.sr.warn{background:#422006;color:#fdba74;border:1px solid #9a3412}
.sr.info{background:#1e3a5f;color:#93c5fd;border:1px solid #1d4ed8}

/* PIN */
.pin-screen{position:fixed;inset:0;background:#0a0a0a;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px}
.pin-screen.show{display:flex}
.pin-logo{font-size:52px;margin-bottom:10px}
.pin-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px}
.pin-sub{font-size:13px;color:#555;margin-bottom:36px}
.pin-dots{display:flex;gap:14px;margin-bottom:28px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #333;background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--red);border-color:var(--red)}
.pin-err{color:#f87171;font-size:12px;margin-bottom:14px;height:18px;text-align:center}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-btn{background:#1e1e1e;border:1px solid #2a2a2a;color:#fff;font-size:22px;font-weight:600;height:68px;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pin-btn:active{background:#2a2a2a}
.pin-btn.del{font-size:16px;color:#666}
.pin-btn.empty{background:transparent;border:none;cursor:default}

/* Scanner */
.scan-ov{display:none;position:fixed;inset:0;background:#000;z-index:500;flex-direction:column}
.scan-ov.show{display:flex}
.scan-top{background:rgba(0,0,0,.8);padding:12px 16px;display:flex;align-items:center;gap:10px}
.scan-top h2{color:#fff;font-size:14px;font-weight:600;flex:1}
.scan-close-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:16px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.scan-wrap{flex:1;position:relative;overflow:hidden}
#scanVideo{width:100%;height:100%;object-fit:cover}
.scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:250px;height:150px;border:2px solid var(--red);border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
.scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);animation:scanline 1.5s ease-in-out infinite}
@keyframes scanline{0%,100%{top:0}50%{top:100%}}

/* Bouton flottant commande */
.float-order{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;border:none;border-radius:24px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;z-index:99;display:none;box-shadow:0 4px 20px rgba(200,16,46,.5);white-space:nowrap}
.float-order.show{display:flex;align-items:center;gap:8px}
.float-order:active{opacity:.8}

.scan-hint{position:absolute;bottom:24px;left:20px;right:20px;text-align:center;color:#fff;font-size:12px;background:rgba(0,0,0,.55);padding:8px;border-radius:8px}
</style>
</head>

<!-- PIN Script (classique, accessible depuis onclick) -->
<script>
var pinCode='';
var PINS={'0000':'depot','1111':'geneve','2222':'vevey'};

function pinPress(d){
  if(pinCode.length>=4)return;
  pinCode+=d;
  updateDots();
  if(pinCode.length===4)setTimeout(checkPin,200);
}
function pinDel(){
  pinCode=pinCode.slice(0,-1);
  updateDots();
  document.getElementById('pinErr').textContent='';
}
function updateDots(){
  for(var i=0;i<4;i++){
    var el=document.getElementById('pd'+i);
    if(el)el.className='pin-dot'+(i<pinCode.length?' filled':'');
  }
}
function checkPin(){
  var shop=PINS[pinCode];
  if(shop){
    document.getElementById('pinScreen').classList.remove('show');
    if(typeof window.startApp==='function')window.startApp(shop);
  } else {
    document.getElementById('pinErr').textContent='Code incorrect';
    pinCode='';
    updateDots();
  }
}
function lockApp(){
  hidePanel();
  pinCode='';
  updateDots();
  document.getElementById('pinErr').textContent='';
  document.getElementById('pinScreen').classList.add('show');
}
function showPanel(){document.getElementById('panelOv').classList.add('show');renderPanel();}
function hidePanel(){document.getElementById('panelOv').classList.remove('show');}
function hideModal(){document.getElementById('modalOv').classList.remove('show');}
</script>

<!-- Firebase + App -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,onSnapshot,addDoc,updateDoc,deleteDoc,setDoc,getDoc,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyC3vf083Qj1l-AxK79LPcvx8F1LdtMtdVw",authDomain:"canadian-american-stock.firebaseapp.com",projectId:"canadian-american-stock",storageBucket:"canadian-american-stock.firebasestorage.app",messagingSenderId:"916149478771",appId:"1:916149478771:web:7b25e704425dfbc207d106"});
const db=getFirestore(app);

let SHOPS=[
  {id:'depot',name:'Entrepôt — Rodrigo',isDepot:true},
  {id:'vevey',name:'Canadian Market — Vevey',isDepot:false},
  {id:'geneve',name:'Canadian Market — Genève',isDepot:false}
];
let DEPTS=['Épicerie & Divers','Boissons','Candy','Mexicain','Amérique Latine','Canadien','Non Food'];

const S={shop:'depot',mode:'stock',tab:0,products:[],orders:[],cart:[],search:'',dept:'',unsubs:[],photoData:null,editId:null};

function isDepot(){return S.shop==='depot';}

// ── Config Firebase ────────────────────────────────────────
async function loadConfig(){
  try{
    const ds=await getDoc(doc(db,'config','departments'));
    if(ds.exists()&&ds.data().list?.length)DEPTS=ds.data().list;
  }catch(e){}
  try{
    const ss=await getDoc(doc(db,'config','shops'));
    if(ss.exists()&&ss.data().list?.length){
      const depot={id:'depot',name:'Entrepôt — Rodrigo',isDepot:true};
      SHOPS=[depot,...ss.data().list.filter(s=>s.id!=='depot')];
    }
  }catch(e){}
}

window.startApp=async function(shop){
  S.shop=shop;
  await loadConfig();
  listen();
};

// ── Firebase listen ────────────────────────────────────────
function listen(){
  S.unsubs.forEach(u=>u());S.unsubs=[];
  // Catalogue commun
  S.unsubs.push(onSnapshot(query(collection(db,'products'),orderBy('name')),snap=>{
    S.products=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
    document.getElementById('syncDot').className='dot';
  },()=>document.getElementById('syncDot').className='dot off'));
  // Commandes
  if(isDepot()){
    // Rodrigo voit toutes les commandes
    S.orders=[];
    SHOPS.filter(s=>!s.isDepot).forEach(sh=>{
      S.unsubs.push(onSnapshot(query(collection(db,`shops/${sh.id}/orders`),orderBy('createdAt','desc')),snap=>{
        const orders=snap.docs.map(d=>({id:d.id,shopId:sh.id,shopName:sh.name,...d.data()}));
        S.orders=S.orders.filter(o=>o.shopId!==sh.id).concat(orders);
        S.orders.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        if(S.mode==='order')render();
        else renderNav();
      }));
    });
  } else {
    S.unsubs.push(onSnapshot(query(collection(db,`shops/${S.shop}/orders`),orderBy('createdAt','desc')),snap=>{
      S.orders=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.mode==='order')render();
      else renderNav();
    }));
  }
}

// ── Render ─────────────────────────────────────────────────
function render(){
  const shop=SHOPS.find(s=>s.id===S.shop)||SHOPS[0];
  document.getElementById('hTitle').textContent=shop.name;
  document.getElementById('hSub').textContent={stock:'📦 Stock',order:'🛒 Commandes',admin:'⚙️ Admin',recap:'📊 Récap'}[S.mode]||'';
  if(S.mode==='admin'&&!isDepot())S.mode='stock';
  renderNav();
  const c=document.getElementById('content');
  if(S.mode==='stock')c.innerHTML=renderStock();
  else if(S.mode==='order')c.innerHTML=renderOrder();
  else if(S.mode==='admin')c.innerHTML=renderAdmin();
  else if(S.mode==='recap')c.innerHTML=renderRecap();
  updateFloatBtn();
}

function updateFloatBtn(){
  const btn=document.getElementById('floatOrder');
  const txt=document.getElementById('floatOrderText');
  if(!btn)return;
  if(!isDepot()&&S.cart.length>0){
    btn.classList.add('show');
    const total=S.cart.reduce((s,c)=>s+c.qty,0);
    if(txt)txt.textContent=`Commander (${total} carton${total>1?'s':''})`;
  } else {
    btn.classList.remove('show');
  }
}

window.goToCart=function(){
  S.mode='order';S.tab=1;
  render();
};

function renderNav(){
  const low=S.products.filter(p=>(p.qty||0)<=(p.minQty||2)).length;
  const pend=S.orders.filter(o=>o.status==='pending').length;
  const cartN=S.cart.reduce((s,c)=>s+c.qty,0);
  const tabs=[
    {id:'stock',ic:'📦',lb:'Stock',b:low},
    {id:'order',ic:'🛒',lb:'Commandes',b:isDepot()?pend:cartN},
    ...(isDepot()?[{id:'admin',ic:'⚙️',lb:'Admin',b:0}]:[]),
    {id:'recap',ic:'📊',lb:'Récap',b:0}
  ];
  document.getElementById('nav').innerHTML=tabs.map(t=>`
    <button class="nb${S.mode===t.id?' active':''}" onclick="setMode('${t.id}')">
      <span class="ic">${t.ic}</span><span class="lb">${t.lb}</span>
      ${t.b>0?`<span class="bdg">${t.b}</span>`:''}
    </button>`).join('');
}

// ── STOCK ──────────────────────────────────────────────────
function renderStock(){
  const fl=S.products.filter(p=>!S.dept||p.dept===S.dept).filter(p=>!S.search||p.name.toLowerCase().includes(S.search.toLowerCase()));
  const out=fl.filter(p=>(p.qty||0)===0);
  let h=`<div class="sb"><input type="search" placeholder="🔍 Rechercher..." value="${S.search}" oninput="setSrch(this.value)"></div>
  <div class="ds">
    <div class="dc${!S.dept?' active':''}" onclick="setDept('')">Tous</div>
    ${DEPTS.map(d=>`<div class="dc${S.dept===d?' active':''}" onclick="setDept('${d}')">${d}</div>`).join('')}
  </div>`;
  if(out.length)h+=`<div class="alert">⚠️ ${out.length} produit(s) épuisé(s)</div>`;
  if(!fl.length)return h+`<div class="empty">Aucun produit</div>`;
  // Grille vignettes pour tous
  return h+`<div class="grid">${fl.map(vigRow).join('')}</div>`;
}

function vigRow(p){
  const qty=p.qty||0,min=p.minQty||2;
  const qc=qty===0?'out':qty<=min?'low':'ok';
  const cartN=S.cart.filter(c=>c.id===p.id).reduce((s,c)=>s+c.qty,0);
  const imgHtml=p.photo?`<img src="${p.photo}" onerror="this.style.display='none'">`:`<div class="vig-emoji">📦</div>`;
  const onclick=isDepot()?"openEditModal('"+p.id+"')":"vigClick('"+p.id+"')";
  const isRupture=qty===0||p.rupture;
  return `<div class="vig" onclick="${onclick}" style="${isRupture&&!isDepot()?'opacity:.6':''}">
    <div class="vig-img" style="${isRupture?'position:relative':''}">
      ${imgHtml}
      ${isRupture?`<div style="position:absolute;inset:0;background:rgba(127,29,29,0.45);display:flex;align-items:center;justify-content:center;flex-direction:column">
        <div style="font-size:11px;font-weight:800;color:#fca5a5;text-align:center;line-height:1.3">RUPTURE<br>DE STOCK</div>
      </div>`:''}
    </div>
    ${cartN>0?`<div class="vig-cart">${cartN}🛒</div>`:''}
    <div class="vig-body">
      <div class="vig-name">${p.name}</div>
      <div class="vig-qty ${qc}">${isRupture?'⚠️ Rupture':qty+' u.'}</div>
    </div>
  </div>`;
}

// ── MODAL ÉDITION (Rodrigo) ────────────────────────────────

      </div>

    </div>

window.calcTotalModal=function(){
  const c=parseInt(document.getElementById('mCartons')?.value)||0;
  const p=parseInt(document.getElementById('mPieces')?.value)||0;
  const ppb=parseInt(document.getElementById('mPpb')?.value)||12;
  const t=c*ppb+p;
  const el=document.getElementById('mTotalDisplay');
  if(el)el.textContent=t+' unités ('+c+' × '+ppb+' + '+p+')';
};

window.chQtyModal=function(d){
  if(!S.editId)return;
  const p=S.products.find(x=>x.id===S.editId);
  if(!p)return;
  const newQty=Math.max(0,(p.qty||0)+d);
  updateDoc(doc(db,'products',S.editId),{qty:newQty});
  document.getElementById('mQtyDisplay').textContent=newQty;
};

window.unsetRupture=async function(id){
  await updateDoc(doc(db,'products',id),{rupture:false});
  hideModal();
};

window.setRupture=async function(id){
  if(!confirm('Mettre ce produit en rupture de stock ?'))return;
  await updateDoc(doc(db,'products',id),{qty:0,rupture:true});
  hideModal();
};

window.saveEdit=async function(id){
  const pid=id||S.editId;
  if(!pid)return;
  const name=document.getElementById('mName')?.value.trim();
  if(!name){alert('Nom requis');return;}
  const ppb=parseInt(document.getElementById('mPpb')?.value)||12;
  const cartons=parseInt(document.getElementById('mCartons')?.value)||0;
  const pieces=parseInt(document.getElementById('mPieces')?.value)||0;
  const qty=cartons*ppb+pieces;
  const updates={
    name,
    barcode:document.getElementById('mBarcode')?.value.trim()||null,
    dept:document.getElementById('mDept')?.value,
    unit:document.getElementById('mUnit')?.value||'unités',
    piecesPerBox:ppb,
    qty,
    minQty:parseInt(document.getElementById('mMin')?.value)||2,
    rupture:qty===0
  };
  if(S.photoData)updates.photo=S.photoData;
  await updateDoc(doc(db,'products',pid),updates);
  S.photoData=null;
  hideModal();
};

window.delProd=async function(id){
  if(!confirm('Supprimer ce produit du catalogue ?'))return;
  await deleteDoc(doc(db,'products',id));
  hideModal();
};

// ── VIGNETTE CLICK (Magasin) ───────────────────────────────
window.vigClick=function(id){
  const p=S.products.find(x=>x.id===id);
  if(!p)return;
  if((p.qty||0)===0||p.rupture){alert('⚠️ Ce produit est en rupture de stock');return;}
  const i=S.cart.findIndex(c=>c.id===id);
  if(i>=0)S.cart[i].qty++;
  else S.cart.push({id,name:p.name,qty:1,piecesPerBox:p.piecesPerBox||12});
  renderNav();
  render();
};

// ── ORDER ──────────────────────────────────────────────────
function renderOrder(){
  let h=`<div class="tb">
    <button class="tbb${S.tab===0?' active':''}" onclick="setTab(0)">${isDepot()?'Commandes reçues':'À commander'} (${isDepot()?S.orders.filter(o=>o.status==='pending').length:S.products.filter(p=>(p.qty||0)<=(p.minQty||2)).length})</button>
    <button class="tbb${S.tab===1?' active':''}" onclick="setTab(1)">${isDepot()?'Toutes':'Panier'} (${isDepot()?S.orders.length:S.cart.length})</button>
    ${!isDepot()?`<button class="tbb${S.tab===2?' active':''}" onclick="setTab(2)">Historique</button>`:''}
  </div>`;
  if(isDepot()){
    const list=S.tab===0?S.orders.filter(o=>o.status==='pending'):S.orders;
    if(!list.length)return h+`<div class="empty">Aucune commande en attente</div>`;
    return h+list.map(o=>{
      const allDone=(o.items||[]).every(i=>i.done);
      const doneCount=(o.items||[]).filter(i=>i.done).length;
      const total=(o.items||[]).length;
      return `<div class="card" style="margin-bottom:14px">
        <div class="card-h" style="flex-direction:column;align-items:flex-start;gap:4px">
          <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
            <h3 style="font-size:14px">📦 ${o.shopName||'Magasin'}</h3>
            <span class="chip ${o.status==='done'?'ok':allDone?'ok':'low'}">${o.status==='done'?'Livrée':allDone?'Prêt à livrer':'En cours '+doneCount+'/'+total}</span>
          </div>
          <div style="font-size:11px;color:var(--muted)">${o.date||''}</div>
        </div>
        <div class="card-b">
          <div class="grid" style="margin-bottom:10px">
            ${(o.items||[]).map((item,idx)=>{
              const prod=S.products.find(p=>p.id===item.id);
              const imgHtml=prod?.photo?`<img src="${prod.photo}" onerror="this.style.display='none'">`:`<div class="vig-emoji">📦</div>`;
              const isDone=item.done;
              return `<div class="vig" onclick="toggleItem('${o.id}','${o.shopId}',${idx})" style="position:relative">
                <div class="vig-img" style="${isDone?'filter:brightness(0.4)':''}">
                  ${imgHtml}
                  ${isDone?`<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#22c55e;font-size:20px;font-weight:800">✓<div style="font-size:9px">Chargé</div></div>`:''}
                </div>
                <div class="vig-body">
                  <div class="vig-name">${item.name}</div>
                  <div class="vig-qty ${isDone?'ok':'low'}">${isDone?'✓ Chargé':'×'+item.qty+' carton'+(item.qty>1?'s':'')}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
          ${o.status!=='done'?`<button class="btn ${allDone?'btn-green':'btn-out'}" onclick="${allDone?`markDone('${o.id}','${o.shopId}')`:''}" style="${allDone?'':'cursor:not-allowed;opacity:.5'}">${allDone?'✅ Marquer comme livrée':'Cliquez sur chaque produit pour cocher'}</button>`:''}
        </div>
      </div>`;
    }).join('');
  }
  // Magasin
  if(S.tab===0){
    const low=S.products.filter(p=>(p.qty||0)<=(p.minQty||2));
    if(!low.length)return h+`<div class="empty">✅ Rien à commander</div>`;
    return h+`<div class="grid">${low.map(p=>{
      const cartN=S.cart.filter(c=>c.id===p.id).reduce((s,c)=>s+c.qty,0);
      const imgHtml=p.photo?`<img src="${p.photo}" onerror="this.style.display='none'">`:`<div class="vig-emoji">📦</div>`;
      return `<div class="vig" onclick="vigClick('${p.id}')">
        <div class="vig-img">${imgHtml}</div>
        ${cartN>0?`<div class="vig-cart">${cartN}🛒</div>`:''}
        <div class="vig-body"><div class="vig-name">${p.name}</div><div class="vig-qty out">Stock: ${p.qty||0}</div></div>
      </div>`;
    }).join('')}</div>`;
  }
  if(S.tab===1){
    if(!S.cart.length)return h+`<div class="empty">Panier vide</div>`;
    return h+`<div class="card"><div class="card-h"><h3>Ma commande</h3></div><div class="card-b">
      ${S.cart.map(item=>`<div class="oi">
        <span>${item.name}</span>
        <div class="qc">
          <button class="qb" onclick="cQty('${item.id}',-1)">−</button>
          <span style="min-width:20px;text-align:center;font-weight:700">${item.qty}</span>
          <button class="qb" onclick="cQty('${item.id}',1)">+</button>
        </div>
      </div>`).join('')}
    </div></div>
    <button class="btn btn-red" onclick="sendOrder()">📤 Envoyer la commande</button>
    <button class="btn btn-out" onclick="clearCart()">🗑 Vider</button>`;
  }
  if(!S.orders.length)return h+`<div class="empty">Aucune commande</div>`;
  return h+S.orders.slice(0,10).map(o=>`
    <div class="card">
      <div class="card-h"><h3>${o.date||''}</h3><span class="chip ${o.status==='done'?'ok':'low'}">${o.status==='done'?'Livrée':'En attente'}</span></div>
      <div class="card-b">${(o.items||[]).map(i=>`<div class="oi ${i.done?'oid':''}"><span>${i.name}</span><span>×${i.qty}</span></div>`).join('')}</div>
    </div>`).join('');
}

// ── RECAP ──────────────────────────────────────────────────
function renderRecap(){
  const tot=S.products.length,out=S.products.filter(p=>(p.qty||0)===0).length;
  const low=S.products.filter(p=>(p.qty||0)>0&&(p.qty||0)<=(p.minQty||2)).length;
  let h=`<div class="sg">
    <div class="sc"><div class="sn">${tot}</div><div class="sl">Produits</div></div>
    <div class="sc"><div class="sn" style="color:#f87171">${out}</div><div class="sl">Épuisés</div></div>
    <div class="sc"><div class="sn" style="color:#fb923c">${low}</div><div class="sl">Stock faible</div></div>
    <div class="sc"><div class="sn" style="color:var(--green)">${tot-out-low}</div><div class="sl">OK</div></div>
  </div>`;
  const byDept={};
  S.products.forEach(p=>{const d=p.dept||'Divers';if(!byDept[d])byDept[d]={ok:0,low:0,out:0};const q=p.qty||0,m=p.minQty||2;if(q===0)byDept[d].out++;else if(q<=m)byDept[d].low++;else byDept[d].ok++;});
  h+=`<div class="st">Par département</div><div class="card"><div class="card-b">`;
  Object.entries(byDept).forEach(([d,s])=>{h+=`<div class="pr"><div class="pinfo"><div class="pn">${d}</div></div><div style="display:flex;gap:5px"><span class="chip ok">${s.ok}</span>${s.low?`<span class="chip low">${s.low}</span>`:''}${s.out?`<span class="chip out">${s.out}</span>`:''}</div></div>`;});
  h+=`</div></div>`;
  return h;
}

// ── Actions ────────────────────────────────────────────────
window.setMode=m=>{S.mode=m;S.tab=0;render();};
window.setTab=t=>{S.tab=t;render();};
window.setSrch=v=>{S.search=v;render();};
window.setDept=d=>{S.dept=d;render();};
window.calcTotal=function(){
  const c=parseInt(document.getElementById('aCartons')?.value)||0;
  const p=parseInt(document.getElementById('aPieces')?.value)||0;
  const ppb=parseInt(document.getElementById('aPpb')?.value)||12;
  const t=c*ppb+p;
  const el=document.getElementById('totalDisplay');
  if(el)el.textContent=`${t} unités (${c} × ${ppb} + ${p})`;
};

window.chQty=async(id,d)=>{
  const p=S.products.find(x=>x.id===id);if(!p)return;
  await updateDoc(doc(db,'products',id),{qty:Math.max(0,(p.qty||0)+d)});
};

window.cQty=(id,d)=>{
  const i=S.cart.findIndex(c=>c.id===id);if(i<0)return;
  S.cart[i].qty+=d;
  if(S.cart[i].qty<=0)S.cart.splice(i,1);
  render();
};
window.clearCart=()=>{S.cart=[];render();};
window.sendOrder=async()=>{
  if(!S.cart.length){alert('Panier vide');return;}
  const sh=SHOPS.find(s=>s.id===S.shop);
  await addDoc(collection(db,`shops/${S.shop}/orders`),{
    shopId:S.shop,shopName:sh?.name||'',
    items:S.cart.map(x=>({...x,done:false})),
    date:new Date().toLocaleString('fr-CH'),
    status:'pending',createdAt:serverTimestamp()
  });
  S.cart=[];alert('✅ Commande envoyée !');S.tab=2;render();
};

window.toggleItem=async function(orderId,shopId,idx){
  const order=S.orders.find(o=>o.id===orderId&&o.shopId===shopId);
  if(!order||order.status==='done')return;
  const items=[...(order.items||[])];
  items[idx]={...items[idx],done:!items[idx].done};
  await updateDoc(doc(db,`shops/${shopId}/orders`,orderId),{items});
};

window.markDone=async(id,shopId)=>{
  await updateDoc(doc(db,`shops/${shopId}/orders`,id),{status:'done'});
};

window.addProduct=async()=>{
  const name=document.getElementById('aName').value.trim();
  if(!name){alert('Nom requis');return;}
  const c=parseInt(document.getElementById('aCartons').value)||0;
  const p=parseInt(document.getElementById('aPieces').value)||0;
  const ppb=parseInt(document.getElementById('aPpb').value)||12;
  await addDoc(collection(db,'products'),{
    name,
    barcode:document.getElementById('aBarcode').value.trim()||null,
    dept:document.getElementById('aDept').value,
    unit:document.getElementById('aUnit').value||'unités',
    piecesPerBox:ppb,
    qty:c*ppb+p,
    minQty:parseInt(document.getElementById('aMin').value)||2,
    photo:S.photoData||null,
    createdAt:serverTimestamp()
  });
  S.photoData=null;
  ['aName','aBarcode'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('aCartons').value='0';
  document.getElementById('aPieces').value='0';
  document.getElementById('totalDisplay').textContent='0 unités';
  document.getElementById('photoPreview').style.display='none';
  document.getElementById('scanResult').style.display='none';
  render();
};

window.handlePhoto=input=>{
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    S.photoData=e.target.result;
    // Preview dans formulaire admin
    const prev=document.getElementById('photoPreview');
    if(prev){prev.src=S.photoData;prev.style.display='block';}
    // Preview dans modal édition
    const mprev=document.getElementById('mPhotoPreview');
    if(mprev){mprev.src=S.photoData;mprev.style.display='block';}
  };
  r.readAsDataURL(file);
  input.value='';
};

// ── Open Food Facts ────────────────────────────────────────
async function lookupBarcode(code){
  const sr=document.getElementById('scanResult');
  if(sr){sr.style.display='block';sr.className='sr info';sr.textContent='🔍 Recherche...';}
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,brands,image_front_url,image_url,categories`);
    const data=await res.json();
    if(data.status===1&&data.product){
      const p=data.product;
      const name=p.product_name||'';
      const brand=p.brands||'';
      const imgUrl=p.image_front_url||p.image_url||'';
      const cats=(p.categories||'').toLowerCase();
      let dept='Épicerie & Divers';
      if(cats.includes('boisson')||cats.includes('drink')||cats.includes('soda'))dept='Boissons';
      else if(cats.includes('candy')||cats.includes('chocol')||cats.includes('confis'))dept='Candy';
      else if(cats.includes('mexican')||cats.includes('mexic'))dept='Mexicain';
      else if(cats.includes('canadian')||cats.includes('maple'))dept='Canadien';
      const fullName=brand?`${name} — ${brand}`:name;
      const ne=document.getElementById('aName');if(ne&&fullName)ne.value=fullName;
      const de=document.getElementById('aDept');if(de)de.value=dept;
      if(imgUrl){
        S.photoData=imgUrl;
        const prev=document.getElementById('photoPreview');
        if(prev){prev.src=imgUrl;prev.style.display='block';}
      }
      if(sr){sr.className='sr ok';sr.textContent=`✅ ${fullName}`;}
    } else {
      if(sr){sr.className='sr warn';sr.textContent=`⚠️ Code ${code} non trouvé`;}
    }
  }catch(e){
    if(sr){sr.className='sr warn';sr.textContent='❌ Erreur réseau';}
  }
}

// ── Scanner ────────────────────────────────────────────────
let scanStream=null,scanInterval=null;
window.openScanner=async()=>{
  document.getElementById('scanOv').classList.add('show');
  try{scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'}}});}
  catch(e){try{scanStream=await navigator.mediaDevices.getUserMedia({video:true});}catch(e2){closeScanner();return;}}
  const video=document.getElementById('scanVideo');
  video.srcObject=scanStream;
  await video.play();
  if('BarcodeDetector' in window){
    const det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39']});
    scanInterval=setInterval(async()=>{
      if(video.readyState===video.HAVE_ENOUGH_DATA){
        try{
          const codes=await det.detect(video);
          if(codes.length){
            const code=codes[0].rawValue;
            closeScanner();
            const bc=document.getElementById('aBarcode');if(bc)bc.value=code;
            const ex=S.products.find(p=>p.barcode===code);
            if(ex){
              const sr=document.getElementById('scanResult');
              if(sr){sr.style.display='block';sr.className='sr warn';sr.textContent=`⚠️ Produit existant: ${ex.name}`;}
            } else {
              lookupBarcode(code);
            }
          }
        }catch(e){}
      }
    },300);
  }
};
window.closeScanner=()=>{
  if(scanInterval){clearInterval(scanInterval);scanInterval=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  document.getElementById('scanOv').classList.remove('show');
};

// ── Magasins & Départements ────────────────────────────────
window.addShop=async()=>{
  const el=document.getElementById('newShopName');
  const name=el?.value.trim();
  if(!name){alert('Nom requis');return;}
  SHOPS.push({id:'shop_'+Date.now(),name,isDepot:false});
  await setDoc(doc(db,'config','shops'),{list:SHOPS});
  if(el)el.value='';
  render();
};
window.removeShop=async id=>{
  if(!confirm('Supprimer ce magasin ?'))return;
  SHOPS=SHOPS.filter(s=>s.id!==id);
  await setDoc(doc(db,'config','shops'),{list:SHOPS});
  render();
};
window.addDept=async()=>{
  const el=document.getElementById('newDept');
  const name=el?.value.trim();
  if(!name||DEPTS.includes(name)){alert(name?'Département existant':'Nom requis');return;}
  DEPTS.push(name);
  await setDoc(doc(db,'config','departments'),{list:DEPTS});
  if(el)el.value='';
  render();
};
window.removeDept=async name=>{
  if(!confirm(`Supprimer "${name}" ?`))return;
  DEPTS=DEPTS.filter(d=>d!==name);
  await setDoc(doc(db,'config','departments'),{list:DEPTS});
  render();
};

function renderPanel(){
  document.getElementById('panelContent').innerHTML=
    `<div class="mr" onclick="lockApp()" style="color:#f87171;border-color:#3f0d0d;background:#1a0808">
      <div><div style="font-weight:700">🔒 Changer d'utilisateur</div></div>
    </div>`+
    SHOPS.map(s=>`<div class="mr${S.shop===s.id?' active':''}" onclick="lockApp()">
      <div><div style="font-weight:700">${s.name}</div><div style="font-size:11px;opacity:.6">${s.isDepot?'Accès complet':'Magasin'}</div></div>
    </div>`).join('');
}
window.renderPanel=renderPanel;
