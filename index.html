<script>
var pinCode='';
var PINS={'0000':'depot','1111':'geneve','2222':'vevey'};
function pinPress(d){
  if(pinCode.length>=4)return;
  pinCode+=d;
  for(var i=0;i<4;i++){var el=document.getElementById('pd'+i);if(el)el.className='pin-dot'+(i<pinCode.length?' filled':'');}
  if(pinCode.length===4)setTimeout(checkPin,200);
}
function pinDel(){
  pinCode=pinCode.slice(0,-1);
  for(var i=0;i<4;i++){var el=document.getElementById('pd'+i);if(el)el.className='pin-dot'+(i<pinCode.length?' filled':'');}
  document.getElementById('pinErr').textContent='';
}
function checkPin(){
  var shop=PINS[pinCode];
  if(shop){
    document.getElementById('pinScreen').classList.remove('show');
    if(typeof window.startApp==='function')window.startApp(shop);
  } else {
    document.getElementById('pinErr').textContent='Code incorrect';
    pinCode='';
    for(var i=0;i<4;i++){var el=document.getElementById('pd'+i);if(el)el.className='pin-dot';}
  }
}
function lockApp(){
  hidePanel();
  pinCode='';
  for(var i=0;i<4;i++){var el=document.getElementById('pd'+i);if(el)el.className='pin-dot';}
  document.getElementById('pinErr').textContent='';
  document.getElementById('pinScreen').classList.add('show');
}
function showPanel(){document.getElementById('panelOv').classList.add('show');if(typeof window.renderPanel==='function')window.renderPanel();}
function hidePanel(){document.getElementById('panelOv').classList.remove('show');}
function hideModal(){document.getElementById('modalOv').classList.remove('show');}
</script>

async function loadConfig(){
  try{const d=await getDoc(doc(db,'config','departments'));if(d.exists()&&d.data().list?.length)DEPTS=d.data().list;}catch(e){}
  try{const s=await getDoc(doc(db,'config','shops'));if(s.exists()&&s.data().list?.length){const dep={id:'depot',name:'Entrepôt — Rodrigo',isDepot:true};SHOPS=[dep,...s.data().list.filter(x=>x.id!=='depot')];}}catch(e){}
}

window.startApp=async function(shop){
  S.shop=shop;
  // Lancer immédiatement sans attendre Firebase config
  listen();
  // Charger config en parallèle
  loadConfig().then(function(){render();}).catch(function(){});
};

function listen(){
  S.unsubs.forEach(u=>u());S.unsubs=[];
  S.unsubs.push(onSnapshot(query(collection(db,'products'),orderBy('name')),snap=>{
    S.products=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
    document.getElementById('syncDot').className='dot';
  },()=>{document.getElementById('syncDot').className='dot off';}));
  if(isDepot()){
    S.orders=[];
    S.alerts=[];
    // Écouter réponses des magasins pour Rodrigo
    S.unsubs.push(onSnapshot(query(collection(db,'shops/depot/alerts'),orderBy('createdAt','desc')),snap=>{
      S.alerts=snap.docs.filter(d=>!d.data().answered).map(d=>({id:d.id,...d.data()}));
      renderNav();
    }));
    SHOPS.filter(s=>!s.isDepot).forEach(sh=>{
      S.unsubs.push(onSnapshot(query(collection(db,'shops/'+sh.id+'/orders'),orderBy('createdAt','desc')),snap=>{
        const orders=snap.docs.map(d=>({id:d.id,shopId:sh.id,shopName:sh.name,...d.data()}));
        S.orders=S.orders.filter(o=>o.shopId!==sh.id).concat(orders);
        S.orders.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        if(S.mode==='order')render();else renderNav();
      }));
    });
  } else {
    S.unsubs.push(onSnapshot(query(collection(db,'shops/'+S.shop+'/orders'),orderBy('createdAt','desc')),snap=>{
      S.orders=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.mode==='order')render();else renderNav();
    }));
    // Écouter les alertes reçues
    S.unsubs.push(onSnapshot(query(collection(db,'shops/'+S.shop+'/alerts'),orderBy('createdAt','desc')),snap=>{
      const prev=S.alerts||[];
      S.alerts=snap.docs.filter(d=>!d.data().answered).map(d=>({id:d.id,...d.data()}));
      // Afficher popup si nouvelle alerte
      if(S.alerts.length>prev.length&&S.alerts.length>0){
        const newAlert=S.alerts[0];
        window.currentNotifAlertId=newAlert.id;
        window.currentNotifProductId=newAlert.productId;
        document.getElementById('notifTitle').textContent='📨 '+newAlert.fromShopName+' cherche un produit';
        document.getElementById('notifMessage').textContent='"'+newAlert.productName+'" est en rupture chez eux. En avez-vous en stock ?';
        document.getElementById('notifQty').value='';
        document.getElementById('notifPopup').classList.add('show');
      }
      if(S.mode==='stock')render();
    }));
  }
}

function render(){
  const shop=SHOPS.find(s=>s.id===S.shop)||SHOPS[0];
  document.getElementById('hTitle').textContent=shop.name;
  document.getElementById('hSub').textContent={stock:'📦 Stock',order:'🛒 Commandes',admin:'⚙️ Admin',recap:'📊 Récap',params:'🔧 Paramètres'}[S.mode]||'';
  if(S.mode==='admin'&&!isDepot())S.mode='stock';
  if(S.mode==='params'&&!isDepot())S.mode='stock';
  renderNav();
  const c=document.getElementById('content');
  if(S.mode==='stock')c.innerHTML=renderStock();
  else if(S.mode==='order')c.innerHTML=renderOrder();
  else if(S.mode==='admin')c.innerHTML=renderAdmin();
  else if(S.mode==='recap')c.innerHTML=renderRecap();
  else if(S.mode==='params')c.innerHTML=renderParams();
  updateFloatBtn();
}

function renderNav(){
  const low=S.products.filter(p=>(p.qty||0)<=(p.minQty||2)).length;
  const alertN=(S.alerts||[]).length;
  const pend=S.orders.filter(o=>o.status==='pending').length;
  const cartN=S.cart.reduce((s,c)=>s+c.qty,0);
  const tabs=isDepot()?[
    {id:'stock',ic:'📦',lb:'Stock',b:low+alertN},
    {id:'order',ic:'🛒',lb:'Commandes',b:pend},
    {id:'admin',ic:'⚙️',lb:'Admin',b:0},
    {id:'recap',ic:'📊',lb:'Récap',b:0},
    {id:'params',ic:'🔧',lb:'Params',b:0}
  ]:[
    {id:'stock',ic:'📦',lb:'Stock',b:low+alertN},
    {id:'order',ic:'🛒',lb:'Commandes',b:cartN},
    {id:'recap',ic:'📊',lb:'Récap',b:0}
  ];
  document.getElementById('nav').innerHTML=tabs.map(t=>'<button class="nb'+(S.mode===t.id?' active':'')+(isDepot()?' style="flex:0.8"':'')+'" onclick="setMode(\''+t.id+'\')">'+'<span class="ic">'+t.ic+'</span><span class="lb">'+t.lb+'</span>'+(t.b>0?'<span class="bdg">'+t.b+'</span>':'')+'</button>').join('');
}

function updateFloatBtn(){
  const btn=document.getElementById('floatOrder');
  if(!btn)return;
  if(!isDepot()&&S.cart.length>0){
    btn.classList.add('show');
    const total=S.cart.reduce((s,c)=>s+c.qty,0);
    btn.textContent='🛒 Commander ('+total+' carton'+(total>1?'s':'')+')';
  } else {
    btn.classList.remove('show');
  }
}

function vigRow(p){
  const qty=p.qty||0,min=p.minQty||2;
  const qc=qty===0?'out':qty<=min?'low':'ok';
  const cartN=S.cart.filter(c=>c.id===p.id).reduce((s,c)=>s+c.qty,0);
  const isRup=qty===0||p.rupture;
  const imgHtml=p.photo?'<img src="'+p.photo+'" onerror="this.style.display=\'none\'">':'<div class="vig-emoji">📦</div>';
  const fn=isDepot()?"openEditModal('"+p.id+"')":"vigClick('"+p.id+"')";
  let html='<div class="vig" onclick="'+fn+'">';
  html+='<div class="vig-img">'+imgHtml;
  if(isRup){
    html+='<div class="vig-rupture"><div class="vig-rupture-txt">RUPTURE<br>DE STOCK</div>';
    if(!isDepot()){
      html+='<button onclick="event.stopPropagation();sendRuptureAlert(\''+p.id+'\')" style="background:var(--red);color:#fff;border:none;border-radius:6px;padding:2px 6px;font-size:9px;font-weight:700;cursor:pointer">Demander</button>';
    }
    html+='</div>';
  }
  html+='</div>';
  if(cartN>0)html+='<div class="vig-cart">'+cartN+'🛒</div>';
  html+='<div class="vig-body"><div class="vig-name">'+p.name+'</div><div class="vig-qty '+qc+'">'+(isRup?'⚠️ Rupture':qty+' u.')+'</div></div></div>';
  return html;
}

function renderStock(){
  const fl=S.products.filter(p=>!S.dept||p.dept===S.dept).filter(p=>!S.search||p.name.toLowerCase().includes(S.search.toLowerCase()));
  const out=fl.filter(p=>(p.qty||0)===0||p.rupture);
  let h='<div class="sb"><input type="search" placeholder="🔍 Rechercher..." value="'+S.search+'" oninput="setSrch(this.value)"></div>';
  h+='<div class="ds"><div class="dc'+(S.dept?'':' active')+'" onclick="setDept(\'\')">Tous</div>'+DEPTS.map(d=>'<div class="dc'+(S.dept===d?' active':'')+'" onclick="setDept(\''+d+'\')">'+d+'</div>').join('')+'</div>';
  // Afficher réponses des magasins pour Rodrigo
  if(isDepot()&&S.alerts&&S.alerts.length>0){
    S.alerts.forEach(function(alert){
      h+='<div style="background:#14532d;border:1px solid #166534;border-radius:10px;padding:12px;margin-bottom:8px">';
      h+='<div style="font-size:13px;font-weight:700;color:#86efac;margin-bottom:4px">📩 Réponse de '+alert.shopName+'</div>';
      h+='<div style="font-size:14px;color:#fff;margin-bottom:8px">'+alert.message+'</div>';
      h+='<button onclick="ignorerAlerteDepot(\"'+alert.id+'\")" style="background:#166534;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer">✓ Lu</button>';
      h+='</div>';
    });
  }
  if(out.length)h+='<div class="alert">⚠️ '+out.length+' produit(s) en rupture</div>';
  if(!fl.length)return h+'<div class="empty">Aucun produit</div>';
  return h+'<div class="grid">'+fl.map(vigRow).join('')+'</div>';
}

function renderOrder(){
  const pending=S.orders.filter(o=>o.status==='pending').length;
  let h='<div class="tb">';
  if(isDepot()){
    h+='<button class="tbb'+(S.tab===0?' active':'')+'" onclick="setTab(0)">En attente ('+pending+')</button>';
    h+='<button class="tbb'+(S.tab===1?' active':'')+'" onclick="setTab(1)">Toutes ('+S.orders.length+')</button>';
  } else {
    const low=S.products.filter(p=>(p.qty||0)<=(p.minQty||2)).length;
  const alertN=(S.alerts||[]).length;
    h+='<button class="tbb'+(S.tab===0?' active':'')+'" onclick="setTab(0)">À commander ('+low+')</button>';
    h+='<button class="tbb'+(S.tab===1?' active':'')+'" onclick="setTab(1)">Panier ('+S.cart.length+')</button>';
    h+='<button class="tbb'+(S.tab===2?' active':'')+'" onclick="setTab(2)">Historique</button>';
  }
  h+='</div>';

  if(isDepot()){
    const list=S.tab===0?S.orders.filter(o=>o.status==='pending'):S.orders;
    if(!list.length)return h+'<div class="empty">Aucune commande</div>';
    return h+list.map(function(o){
      const allDone=(o.items||[]).every(function(i){return i.done;});
      const done=(o.items||[]).filter(function(i){return i.done;}).length;
      const tot=(o.items||[]).length;
      let r='<div class="card" style="margin-bottom:14px">';
      r+='<div class="card-h" style="flex-direction:column;align-items:flex-start;gap:4px">';
      r+='<div style="display:flex;align-items:center;justify-content:space-between;width:100%"><h3>📦 '+(o.shopName||'Magasin')+'</h3><span class="chip '+(o.status==='done'?'ok':allDone?'ok':'low')+'">'+(o.status==='done'?'Livrée':allDone?'Prêt':done+'/'+tot)+'</span></div>';
      r+='<div style="font-size:11px;color:var(--muted)">'+(o.date||'')+'</div></div>';
      r+='<div class="card-b"><div class="grid" style="margin-bottom:10px">';
      (o.items||[]).forEach(function(item,idx){
        const prod=S.products.find(function(p){return p.id===item.id;});
        const imgH=prod&&prod.photo?'<img src="'+prod.photo+'" onerror="this.style.display=\'none\'">':'<div class="vig-emoji">📦</div>';
        r+='<div class="vig" onclick="toggleItem(\''+o.id+'\',\''+o.shopId+'\','+idx+')">';
        r+='<div class="vig-img" style="'+(item.done?'filter:brightness(.4)':'')+'">'+imgH;
        if(item.done)r+='<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#22c55e;font-size:20px;font-weight:800">✓<div style="font-size:9px">Chargé</div></div>';
        r+='</div><div class="vig-body"><div class="vig-name">'+(item.name||'')+'</div><div class="vig-qty '+(item.done?'ok':'low')+'">'+(item.done?'✓ Chargé':'×'+item.qty+' carton'+(item.qty>1?'s':''))+'</div></div></div>';
      });
      r+='</div>';
      if(o.status!=='done'){
        if(allDone){
          r+='<button class="btn btn-green" onclick="markDone(\''+o.id+'\',\''+o.shopId+'\')">✅ Marquer comme livrée</button>';
        } else {
          r+='<button class="btn btn-out" style="cursor:not-allowed;opacity:.5">Cliquez sur chaque produit pour cocher</button>';
        }
      }
      r+='</div></div>';
      return r;
    }).join('');
  }

  // Magasin
  if(S.tab===0){
    const low=S.products.filter(p=>(p.qty||0)<=(p.minQty||2)&&!(p.rupture));
    if(!low.length)return h+'<div class="empty">✅ Rien à commander</div>';
    return h+'<div class="grid">'+low.map(function(p){
      const cartN=S.cart.filter(c=>c.id===p.id).reduce((s,c)=>s+c.qty,0);
      const imgH=p.photo?'<img src="'+p.photo+'" onerror="this.style.display=\'none\'">':'<div class="vig-emoji">📦</div>';
      return '<div class="vig" onclick="vigClick(\''+p.id+'\')">'+'<div class="vig-img">'+imgH+'</div>'+(cartN>0?'<div class="vig-cart">'+cartN+'🛒</div>':'')+'<div class="vig-body"><div class="vig-name">'+p.name+'</div><div class="vig-qty out">Stock: '+(p.qty||0)+'</div></div></div>';
    }).join('')+'</div>';
  }
  if(S.tab===1){
    if(!S.cart.length)return h+'<div class="empty">Panier vide</div>';
    let r=h+'<div class="card"><div class="card-h"><h3>Ma commande</h3></div><div class="card-b">';
    S.cart.forEach(function(item){
      r+='<div class="oi"><span>'+item.name+'</span><div style="display:flex;align-items:center;gap:6px"><button class="qb" onclick="cQty(\''+item.id+'\',-1)">−</button><span style="min-width:20px;text-align:center;font-weight:700">'+item.qty+'</span><button class="qb" onclick="cQty(\''+item.id+'\',1)">+</button></div></div>';
    });
    r+='</div></div><button class="btn btn-red" onclick="sendOrder()">📤 Envoyer la commande</button><button class="btn btn-out" onclick="clearCart()">🗑 Vider</button>';
    return r;
  }
  if(!S.orders.length)return h+'<div class="empty">Aucune commande</div>';
  return h+S.orders.slice(0,10).map(function(o){
    return '<div class="card"><div class="card-h"><h3>'+(o.date||'')+'</h3><span class="chip '+(o.status==='done'?'ok':'low')+'">'+(o.status==='done'?'Livrée':'En attente')+'</span></div><div class="card-b">'+(o.items||[]).map(function(i){return '<div class="oi"><span>'+i.name+'</span><span>×'+i.qty+'</span></div>';}).join('')+'</div></div>';
  }).join('');
}

function renderAdmin(){
  let r='<div class="st">Ajouter un produit</div><div class="card"><div class="card-b">';
  r+='<button class="btn btn-blue" onclick="openScanner()">📷 Scanner le code-barres</button>';
  r+='<div class="sr" id="scanResult"></div>';
  r+='<div id="imgChoices"></div>';
  r+='<div class="fg"><label class="fl">Code-barres</label><input class="fi" id="aBarcode" placeholder="Scanné ou manuel" inputmode="numeric"></div>';
  r+='<div class="fg"><label class="fl">Nom *</label><input class="fi" id="aName" placeholder="Ex: Dr Pepper 355ml"></div>';
  r+='<div class="fg"><label class="fl">Département</label><select class="fi" id="aDept">'+DEPTS.map(d=>'<option>'+d+'</option>').join('')+'</select></div>';
  r+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="fg"><label class="fl">Pièces/master case</label><input class="fi" id="aPpb" type="number" value="12" min="1" oninput="calcTotal()"></div><div class="fg"><label class="fl">Unité</label><input class="fi" id="aUnit" value="unités"></div></div>';
  r+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="fg"><label class="fl">Cartons complets</label><input class="fi" id="aCartons" type="number" value="0" min="0" oninput="calcTotal()"></div><div class="fg"><label class="fl">Pièces séparées</label><input class="fi" id="aPieces" type="number" value="0" min="0" oninput="calcTotal()"></div></div>';
  r+='<div class="fg"><label class="fl">Total calculé</label><div id="totalDisplay" style="background:#14532d;border:1px solid #166534;border-radius:10px;padding:10px;font-size:16px;font-weight:800;color:#22c55e;text-align:center">0 unités</div></div>';
  r+='<div class="fg"><label class="fl">Seuil alerte (unités)</label><input class="fi" id="aMin" type="number" value="2" min="0"></div>';
  r+='<div class="fg"><label class="fl">Photo</label><div class="photo-btns"><button class="btn btn-blue btn-sm" style="padding:10px" onclick="document.getElementById(\'photoCamera\').click()">📷 Caméra</button><button class="btn btn-out btn-sm" style="padding:10px" onclick="document.getElementById(\'photoGallery\').click()">🖼 Galerie</button></div><img id="photoPreview" style="display:none;width:100%;height:80px;object-fit:cover;border-radius:10px"></div>';
  r+='<button class="btn btn-red" onclick="addProduct()">+ Ajouter le produit</button>';
  r+='</div></div>';
  r+='<div class="st">Produits ('+S.products.length+')</div><div class="card"><div class="card-b">';
  if(!S.products.length){r+='<div class="empty">Aucun produit</div>';}
  else{S.products.forEach(function(p){r+='<div class="pr"><div class="pi">'+(p.photo?'<img src="'+p.photo+'">':(p.emoji||'📦'))+'</div><div class="pinfo"><div class="pn">'+p.name+'</div><div class="pd">'+(p.dept||'')+' · '+(p.piecesPerBox||12)+' pcs/MC</div></div><button onclick="openEditModal(\''+p.id+'\')" style="background:none;border:none;font-size:16px;cursor:pointer;color:#93c5fd">✏️</button></div>';});}
  r+='</div></div>';
  return r;
}

function renderParams(){
  let r='<div class="st">Gérer les magasins</div><div class="card"><div class="card-b">';
  r+='<div style="display:flex;gap:8px;margin-bottom:10px"><input class="fi" id="newShopName" placeholder="Nom du magasin..." style="flex:1"><button class="btn btn-green btn-sm" onclick="addShop()">+ Ajouter</button></div>';
  SHOPS.filter(s=>!s.isDepot).forEach(function(s){r+='<div class="pr"><div class="pinfo"><div class="pn">'+s.name+'</div></div><button onclick="removeShop(\''+s.id+'\')" style="background:none;border:none;font-size:16px;cursor:pointer;color:#f87171">🗑</button></div>';});
  r+='</div></div>';
  r+='<div class="st">Gérer les départements</div><div class="card"><div class="card-b">';
  r+='<div style="display:flex;gap:8px;margin-bottom:10px"><input class="fi" id="newDept" placeholder="Nouveau département..." style="flex:1"><button class="btn btn-green btn-sm" onclick="addDept()">+ Ajouter</button></div>';
  DEPTS.forEach(function(d){r+='<div class="pr"><div class="pinfo"><div class="pn">'+d+'</div></div><button onclick="removeDept(\''+d+'\')" style="background:none;border:none;font-size:16px;cursor:pointer;color:#f87171">🗑</button></div>';});
  r+='</div></div>';
  return r;
}

function renderRecap(){
  const tot=S.products.length,out=S.products.filter(p=>(p.qty||0)===0||p.rupture).length;
  const low=S.products.filter(p=>(p.qty||0)>0&&!p.rupture&&(p.qty||0)<=(p.minQty||2)).length;
  let h='<div class="sg"><div class="sc"><div class="sn">'+tot+'</div><div class="sl">Produits</div></div><div class="sc"><div class="sn" style="color:#f87171">'+out+'</div><div class="sl">Rupture</div></div><div class="sc"><div class="sn" style="color:#fb923c">'+low+'</div><div class="sl">Stock faible</div></div><div class="sc"><div class="sn" style="color:var(--green)">'+(tot-out-low)+'</div><div class="sl">OK</div></div></div>';
  const byDept={};
  S.products.forEach(p=>{const d=p.dept||'Divers';if(!byDept[d])byDept[d]={ok:0,low:0,out:0};const q=p.qty||0,m=p.minQty||2;if(q===0||p.rupture)byDept[d].out++;else if(q<=m)byDept[d].low++;else byDept[d].ok++;});
  h+='<div class="st">Par département</div><div class="card"><div class="card-b">';
  Object.entries(byDept).forEach(function(e){h+='<div class="pr"><div class="pinfo"><div class="pn">'+e[0]+'</div></div><div style="display:flex;gap:5px"><span class="chip ok">'+e[1].ok+'</span>'+(e[1].low?'<span class="chip low">'+e[1].low+'</span>':'')+(e[1].out?'<span class="chip out">'+e[1].out+'</span>':'')+'</div></div>';});
  h+='</div></div>';
  return h;
}

// Actions
window.setMode=m=>{S.mode=m;S.tab=0;render();};
window.setTab=t=>{S.tab=t;render();};
window.setSrch=v=>{S.search=v;render();};
window.setDept=d=>{S.dept=d;render();};
window.goToCart=()=>{S.mode='order';S.tab=1;render();};
window.calcTotal=function(){
  const c=parseInt(document.getElementById('aCartons')?.value)||0;
  const p=parseInt(document.getElementById('aPieces')?.value)||0;
  const ppb=parseInt(document.getElementById('aPpb')?.value)||12;
  const t=c*ppb+p;
  const el=document.getElementById('totalDisplay');
  if(el)el.textContent=t+' unités ('+c+' × '+ppb+' + '+p+')';
};

var currentRuptureId=null;

window.showRupturePopup=function(id){
  const p=S.products.find(x=>x.id===id);
  if(!p)return;
  currentRuptureId=id;
  document.getElementById('ruptureProductName').textContent=p.name;
  document.getElementById('rupturePopup').classList.add('show');
};

window.closeRupturePopup=function(){
  document.getElementById('rupturePopup').classList.remove('show');
  currentRuptureId=null;
};

window.confirmRuptureAlert=async function(){
  if(!currentRuptureId)return;
  document.getElementById('rupturePopup').classList.remove('show');
  await sendRuptureAlert(currentRuptureId);
  currentRuptureId=null;
};

window.vigClick=function(id){
  const p=S.products.find(x=>x.id===id);
  if(!p)return;
  if((p.qty||0)===0||p.rupture){
    showRupturePopup(id);
    return;
  }
  const i=S.cart.findIndex(c=>c.id===id);
  if(i>=0)S.cart[i].qty++;
  else S.cart.push({id,name:p.name,qty:1,piecesPerBox:p.piecesPerBox||12});
  renderNav();updateFloatBtn();render();
};

window.cQty=function(id,d){
  const i=S.cart.findIndex(c=>c.id===id);if(i<0)return;
  S.cart[i].qty+=d;
  if(S.cart[i].qty<=0)S.cart.splice(i,1);
  render();
};
window.clearCart=()=>{S.cart=[];render();};
window.sendOrder=async()=>{
  if(!S.cart.length){alert('Panier vide');return;}
  const sh=SHOPS.find(s=>s.id===S.shop);
  await addDoc(collection(db,'shops/'+S.shop+'/orders'),{
    shopId:S.shop,shopName:sh?.name||'',
    items:S.cart.map(x=>({...x,done:false})),
    date:new Date().toLocaleString('fr-CH'),
    status:'pending',createdAt:serverTimestamp()
  });
  S.cart=[];alert('✅ Commande envoyée à Rodrigo !');S.tab=2;render();
};
window.markDone=async(id,shopId)=>{
  await updateDoc(doc(db,'shops/'+shopId+'/orders/'+id),{status:'done'});
};
window.toggleItem=async function(orderId,shopId,idx){
  const order=S.orders.find(o=>o.id===orderId&&o.shopId===shopId);
  if(!order||order.status==='done')return;
  const items=[...(order.items||[])];
  const wasDone=items[idx].done;
  items[idx]={...items[idx],done:!wasDone};
  await updateDoc(doc(db,'shops/'+shopId+'/orders/'+orderId),{items});
  // Déduire/remettre stock
  const item=items[idx];
  const prod=S.products.find(p=>p.id===item.id);
  if(prod){
    const units=(item.qty||1)*(prod.piecesPerBox||12);
    const newQty=wasDone?(prod.qty||0)+units:Math.max(0,(prod.qty||0)-units);
    await updateDoc(doc(db,'products',item.id),{qty:newQty});
  }
};

window.openEditModal=function(id){
  const p=S.products.find(x=>x.id===id);
  if(!p)return;
  S.editId=id;
  const qty=p.qty||0;
  const ppb=p.piecesPerBox||12;
  const cartons=Math.floor(qty/ppb);
  const pieces=qty%ppb;
  document.getElementById('modalTitle').textContent='✏️ '+p.name;
  let mc='<button class="btn btn-blue" onclick="openScanner()">📷 Scanner le code-barres</button>';
  mc+='<div class="sr" id="scanResult"></div>';
  mc+='<div class="fg"><label class="fl">Code-barres</label><input class="fi" id="mBarcode" value="'+(p.barcode||'')+'" inputmode="numeric"></div>';
  mc+='<div class="fg"><label class="fl">Nom *</label><input class="fi" id="mName" value="'+(p.name||'')+'"></div>';
  mc+='<div class="fg"><label class="fl">Département</label><select class="fi" id="mDept">'+DEPTS.map(d=>'<option'+(p.dept===d?' selected':'')+'>'+d+'</option>').join('')+'</select></div>';
  mc+='<div class="fg"><label class="fl">Pièces/master case</label><input class="fi" id="mPpb" type="number" value="'+ppb+'" min="1" oninput="calcTotalM()"></div>';
  mc+='<div class="fg"><label class="fl">Unité</label><input class="fi" id="mUnit" value="'+(p.unit||'unités')+'"></div>';
  mc+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="fg"><label class="fl">Cartons complets</label><input class="fi" id="mCartons" type="number" value="'+cartons+'" min="0" oninput="calcTotalM()"></div><div class="fg"><label class="fl">Pièces séparées</label><input class="fi" id="mPieces" type="number" value="'+pieces+'" min="0" oninput="calcTotalM()"></div></div>';
  mc+='<div class="fg"><label class="fl">Total calculé</label><div id="mTotalDisplay" style="background:#14532d;border:1px solid #166534;border-radius:10px;padding:10px;font-size:16px;font-weight:800;color:#22c55e;text-align:center">'+qty+' unités ('+cartons+' × '+ppb+' + '+pieces+')</div></div>';
  mc+='<div class="fg"><label class="fl">Seuil alerte</label><input class="fi" id="mMin" type="number" value="'+(p.minQty||2)+'" min="0"></div>';
  mc+='<div class="fg"><label class="fl">Photo</label><div class="photo-btns"><button class="btn btn-blue btn-sm" style="padding:10px" onclick="document.getElementById(\'photoCamera\').click()">📷 Caméra</button><button class="btn btn-out btn-sm" style="padding:10px" onclick="document.getElementById(\'photoGallery\').click()">🖼 Galerie</button></div>';
  mc+=(p.photo?'<img id="mPhotoPreview" src="'+p.photo+'" style="width:100%;height:80px;object-fit:cover;border-radius:10px;margin-bottom:8px">':'<img id="mPhotoPreview" style="display:none;width:100%;height:80px;object-fit:cover;border-radius:10px;margin-bottom:8px">');
  mc+='</div>';
  mc+='<button class="btn btn-red" onclick="saveEdit(\''+id+'\')">💾 Sauvegarder</button>';
  if(p.rupture||qty===0){
    mc+='<button class="btn btn-green" onclick="unsetRupture(\''+id+'\')">✅ Remettre en stock</button>';
  } else {
    mc+='<button class="btn btn-orange" onclick="setRupture(\''+id+'\')">⚠️ Mettre en rupture</button>';
  }
  mc+='<button class="btn btn-out" style="color:#f87171;border-color:#3f0d0d" onclick="delProd(\''+id+'\')">🗑 Supprimer</button>';
  document.getElementById('modalContent').innerHTML=mc;
  document.getElementById('modalOv').classList.add('show');
};

window.calcTotalM=function(){
  const c=parseInt(document.getElementById('mCartons')?.value)||0;
  const p=parseInt(document.getElementById('mPieces')?.value)||0;
  const ppb=parseInt(document.getElementById('mPpb')?.value)||12;
  const t=c*ppb+p;
  const el=document.getElementById('mTotalDisplay');
  if(el)el.textContent=t+' unités ('+c+' × '+ppb+' + '+p+')';
};

window.saveEdit=async function(id){
  const name=document.getElementById('mName')?.value.trim();
  if(!name){alert('Nom requis');return;}
  const ppb=parseInt(document.getElementById('mPpb')?.value)||12;
  const cartons=parseInt(document.getElementById('mCartons')?.value)||0;
  const pieces=parseInt(document.getElementById('mPieces')?.value)||0;
  const qty=cartons*ppb+pieces;
  const updates={name,barcode:document.getElementById('mBarcode')?.value.trim()||null,dept:document.getElementById('mDept')?.value,unit:document.getElementById('mUnit')?.value||'unités',piecesPerBox:ppb,qty,minQty:parseInt(document.getElementById('mMin')?.value)||2,rupture:qty===0};
  if(S.photoData)updates.photo=S.photoData;
  await updateDoc(doc(db,'products',id),updates);
  S.photoData=null;
  hideModal();
};

window.setRupture=async function(id){
  if(!confirm('Mettre en rupture ?'))return;
  await updateDoc(doc(db,'products',id),{qty:0,rupture:true});
  hideModal();
};

window.unsetRupture=async function(id){
  await updateDoc(doc(db,'products',id),{rupture:false,qty:1});
  hideModal();
};

window.delProd=async function(id){
  if(!confirm('Supprimer ?'))return;
  await deleteDoc(doc(db,'products',id));
  hideModal();
};

window.sendRuptureAlert=async function(id){
  const p=S.products.find(x=>x.id===id);
  if(!p)return;
  const myName=SHOPS.find(s=>s.id===S.shop)?.name||S.shop;
  for(const sh of SHOPS.filter(s=>!s.isDepot&&s.id!==S.shop)){
    await addDoc(collection(db,'shops/'+sh.id+'/alerts'),{
      productId:id,productName:p.name,
      fromShop:S.shop,fromShopName:myName,
      answered:false,createdAt:serverTimestamp()
    });
  }
  alert('✅ Demande envoyée aux autres magasins !');
};

window.ignorerAlerteDepot=async function(alertId){
  await updateDoc(doc(db,'shops/depot/alerts/'+alertId),{answered:true});
};

window.currentNotifAlertId=null;
window.currentNotifProductId=null;

window.ignorerNotif=async function(){
  if(window.currentNotifAlertId){
    await updateDoc(doc(db,'shops/'+S.shop+'/alerts/'+window.currentNotifAlertId),{answered:true});
  }
  document.getElementById('notifPopup').classList.remove('show');
};

window.repondreNotif=async function(){
  const qty=parseInt(document.getElementById('notifQty')?.value)||0;
  const alertId=window.currentNotifAlertId;
  const productId=window.currentNotifProductId;
  if(!alertId)return;
  const p=S.products.find(x=>x.id===productId);
  const myName=SHOPS.find(s=>s.id===S.shop)?.name||S.shop;
  // Calculer la moitié à partager
  const toShare=qty>0?Math.floor(qty/2):0;
  // Marquer alerte comme répondu
  await updateDoc(doc(db,'shops/'+S.shop+'/alerts/'+alertId),{answered:true,response:qty,toShare});
  // Alerter Rodrigo avec instruction de ramassage
  await addDoc(collection(db,'shops/depot/alerts'),{
    type:'reponse_partage',
    productId,
    productName:p?.name||productId,
    shopId:S.shop,
    shopName:myName,
    qty,toShare,
    message:'📦 '+myName+' a '+qty+' unité(s) de "+'+(p?.name||productId)+'". Lors de ta prochaine livraison, récupère '+toShare+' unité(s) pour les redistribuer.',
    answered:false,
    createdAt:serverTimestamp()
  });
  document.getElementById('notifPopup').classList.remove('show');
  alert('✅ Réponse envoyée ! Rodrigo a été informé de récupérer '+toShare+' unité(s) chez vous.');
};

window.repondreAlerte=async function(alertId,productId){

window.handlePhoto=function(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=function(e){
    // Recadrer en carré
    const img=new Image();
    img.onload=function(){
      const size=Math.min(img.width,img.height);
      const canvas=document.createElement('canvas');
      canvas.width=400;canvas.height=400;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,400,400);
      S.photoData=canvas.toDataURL('image/jpeg',0.85);
      const prev=document.getElementById('photoPreview')||document.getElementById('mPhotoPreview');
      if(prev){prev.src=S.photoData;prev.style.display='block';}
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
  input.value='';
};

async function lookupBarcode(code){
  const sr=document.getElementById('scanResult');
  if(sr){sr.style.display='block';sr.className='sr info';sr.textContent='🔍 Recherche...';}
  try{
    const res=await fetch('https://world.openfoodfacts.org/api/v2/product/'+code+'.json?fields=product_name,brands,image_front_url,image_front_small_url,image_url,image_small_url,categories,selected_images,images');
    const data=await res.json();
    if(data.status===1&&data.product){
      const p=data.product;
      const name=p.product_name||'';
      const brand=p.brands||'';
      const cats=(p.categories||'').toLowerCase();
      let dept='Épicerie & Divers';
      if(cats.includes('boisson')||cats.includes('drink')||cats.includes('soda'))dept='Boissons';
      else if(cats.includes('candy')||cats.includes('chocol'))dept='Candy';
      else if(cats.includes('mexic'))dept='Mexicain';
      else if(cats.includes('canad')||cats.includes('maple'))dept='Canadien';
      const fullName=brand?name+' — '+brand:name;
      const ne=document.getElementById('aName')||document.getElementById('mName');
      if(ne&&fullName)ne.value=fullName;
      const de=document.getElementById('aDept')||document.getElementById('mDept');
      if(de)de.value=dept;
      // Images — récupérer toutes les images disponibles
      const imgs=[];
      const seen=new Set();
      function addImg(url){if(url&&!seen.has(url)){seen.add(url);imgs.push(url);}}
      // Images principales
      addImg(p.image_front_url);
      addImg(p.image_front_small_url);
      addImg(p.image_url);
      addImg(p.image_small_url);
      // Images secondaires depuis selected_images
      const si=p.selected_images||{};
      ['front','ingredients','nutrition','packaging'].forEach(function(k){
        const sizes=si[k]||{};
        ['display','small','thumb'].forEach(function(s){
          const langs=sizes[s]||{};
          Object.values(langs).forEach(function(u){addImg(u);});
        });
      });
      // Images depuis images object
      const allImgs=p.images||{};
      Object.keys(allImgs).forEach(function(k){
        const imgObj=allImgs[k];
        if(imgObj&&imgObj.sizes){
          const base='https://images.openfoodfacts.org/images/products/'+code.replace(/^(\d{3})(\d{3})(\d{3})(\d+)$/,'$1/$2/$3/$4')+'/'+k;
          addImg(base+'.400.jpg');
        }
      });
      if(imgs.length>0){
        const ic=document.getElementById('imgChoices');
        if(ic){
          let html='<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Choisir une photo ('+imgs.length+') :</div><div class="img-choices">';
          imgs.forEach(function(url,i){
            html+='<div class="img-choice'+(i===0?' selected':'')+'" onclick="selectPhoto(\''+url+'\',this)"><img src="'+url+'" onerror="this.parentElement.style.display=\'none\'"></div>';
          });
          html+='</div>';
          ic.innerHTML=html;
        }
        window.selectProductPhoto(imgs[0],null);
      }
      if(sr){sr.className='sr ok';sr.textContent='✅ '+fullName;}
    } else {
      if(sr){sr.className='sr warn';sr.textContent='⚠️ Code '+code+' non trouvé';}
    }
  }catch(e){
    if(sr){sr.className='sr warn';sr.textContent='❌ Erreur réseau';}
  }
}

window.selectPhoto=function(url,el){
  if(el){
    const cont=el.parentElement;
    cont.querySelectorAll('.img-choice').forEach(function(d){d.classList.remove('selected');});
    el.classList.add('selected');
  }
  window.selectProductPhoto(url,null);
};

window.selectProductPhoto=function(url,el){
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    const size=Math.min(img.width,img.height);
    const canvas=document.createElement('canvas');
    canvas.width=400;canvas.height=400;
    canvas.getContext('2d').drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,400,400);
    S.photoData=canvas.toDataURL('image/jpeg',0.85);
    const prev=document.getElementById('photoPreview')||document.getElementById('mPhotoPreview');
    if(prev){prev.src=S.photoData;prev.style.display='block';}
  };
  img.onerror=function(){S.photoData=url;};
  img.src=url;
};

let scanStream=null,scanInterval=null;
window.openScanner=async function(){
  document.getElementById('scanOv').classList.add('show');
  document.getElementById('scanHint').textContent='Initialisation caméra...';
  try{scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'},width:{ideal:1280},height:{ideal:720}}});}
  catch(e){try{scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});}
  catch(e2){try{scanStream=await navigator.mediaDevices.getUserMedia({video:true});}
  catch(e3){document.getElementById('scanHint').textContent='Caméra non disponible';return;}}}
  const video=document.getElementById('scanVideo');
  video.srcObject=scanStream;
  video.onloadedmetadata=function(){
    video.play();
    document.getElementById('scanHint').textContent='Pointez vers le code-barres';
    if('BarcodeDetector' in window){
      const det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39']});
      scanInterval=setInterval(async function(){
        if(video.readyState>=2){
          try{
            const codes=await det.detect(video);
            if(codes.length){
              const code=codes[0].rawValue;
              closeScanner();
              const bc=document.getElementById('aBarcode')||document.getElementById('mBarcode');
              if(bc)bc.value=code;
              const ex=S.products.find(p=>p.barcode===code);
              if(ex){const sr=document.getElementById('scanResult');if(sr){sr.style.display='block';sr.className='sr warn';sr.textContent='⚠️ Produit existant: '+ex.name;}}
              else lookupBarcode(code);
            }
          }catch(e){}
        }
      },300);
    } else {
      document.getElementById('scanHint').textContent='Scanner non supporté — saisissez manuellement';
    }
  };
};
window.closeScanner=function(){
  if(scanInterval){clearInterval(scanInterval);scanInterval=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  document.getElementById('scanOv').classList.remove('show');
};

window.addShop=async function(){

  if(el)el.value='';

};

  SHOPS=SHOPS.filter(s=>s.id!==id);
  await setDoc(doc(db,'config','shops'),{list:SHOPS});
  render();
};
window.addDept=async function(){

  DEPTS.push(name);
  await setDoc(doc(db,'config','departments'),{list:DEPTS});
  if(el)el.value='';
  render();
};
window.removeDept=async function(name){
  if(!confirm('Supprimer "'+name+'" ?'))return;
  DEPTS=DEPTS.filter(d=>d!==name);
  await setDoc(doc(db,'config','departments'),{list:DEPTS});
  render();
};
