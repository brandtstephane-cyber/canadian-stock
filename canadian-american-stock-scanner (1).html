<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C8102E">
<title>Canadian & American Market</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--red:#C8102E;--red2:#8B0B1F;--red-bg:#3a0a10;--bg:#121212;--white:#1e1e1e;--border:#333;--text:#f0f0f0;--muted:#888;--green:#22c55e;--green-bg:#14532d}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.hdr{background:var(--red);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr h1{font-size:15px;font-weight:600;line-height:1.2}
.hdr .sub{font-size:11px;opacity:.8;margin-top:2px}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:4px}
.dot.off{background:#f87171}
.btn-sw{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer}
.content{flex:1;padding:12px;padding-bottom:80px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 12px;border:none;background:none;cursor:pointer;position:relative}
.nb .ic{font-size:22px;line-height:1}
.nb .lb{font-size:9px;color:var(--muted);margin-top:3px;font-weight:500}
.nb.on .lb{color:var(--red)}
.bdot{position:absolute;top:6px;right:calc(50% - 18px);width:8px;height:8px;background:var(--red);border-radius:50%;display:none}
.bdot.show{display:block}
.card{background:var(--white);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.ch{padding:12px 14px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cb{padding:12px 14px}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pc{background:var(--bg);border-radius:10px;overflow:hidden;cursor:pointer;position:relative;border:2px solid transparent}
.pc.sel{border-color:var(--red)}
.psq{width:100%;padding-top:100%;position:relative;background:#222}
.psq img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.psq .em{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px}
.pi{padding:5px 6px 7px}
.pn{font-size:10px;font-weight:600;line-height:1.2;color:var(--text)}
.pd{font-size:9px;color:var(--muted);margin-top:1px}
.pq{font-size:9px;color:var(--red);font-weight:600;margin-top:2px}
.qb{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;font-size:11px;font-weight:700;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 4px;z-index:2}
.rt{position:absolute;top:4px;left:4px;background:#fee2e2;color:#991b1b;font-size:8px;padding:2px 5px;border-radius:6px;font-weight:600;z-index:2}
.btn{display:block;width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.br{background:var(--red);color:#fff}
.bo{background:var(--white);color:var(--text);border:1px solid var(--border)}
.bsm{padding:5px 10px;font-size:11px;border-radius:8px;border:1px solid var(--border);background:var(--white);cursor:pointer;color:var(--text)}
.bsm.dn{color:#991b1b;border-color:#fca5a5;background:#fee2e2}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:var(--white);margin-bottom:8px;outline:none;color-scheme:dark}
input:focus,select:focus,textarea:focus{border-color:var(--red)}
textarea{min-height:56px;resize:none}
label.lbl{font-size:12px;color:var(--muted);display:block;margin-bottom:3px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tp{background:var(--red-bg);color:#f87171;border-radius:10px;padding:9px 12px;font-size:12px;font-weight:600;margin-bottom:8px;border:1px solid #5a1a1a}
.or{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.or:last-child{border:none}
.ck{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:13px}
.ck.dn{background:var(--green);border-color:var(--green);color:#fff}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tr{background:var(--red-bg);color:#f87171}
.tg{background:var(--green-bg);color:var(--green)}
.tgr{background:#222;color:var(--muted)}
.dscr{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.dscr::-webkit-scrollbar{display:none}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;color:var(--text)}
.chip.on{background:var(--red-bg);color:#f87171;border-color:transparent;font-weight:600}
.mpanel{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:12px}
.mrow{padding:10px 12px;border-radius:10px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text)}
.mrow.on{background:var(--red);color:#fff;border-color:transparent}
.emp{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.di{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
.di:last-child{border:none}
.qc{display:flex;align-items:center;gap:8px}
.qbn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.pbtns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.pbtn{padding:10px 6px;background:var(--bg);border:1px solid var(--border);border-radius:10px;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;display:block;line-height:1.4}
.pbtn .ic{font-size:18px;display:block;margin-bottom:3px}
.sbtn{display:block;width:100%;padding:11px;background:#0c2a3a;border:1.5px solid #0ea5e9;border-radius:10px;text-align:center;font-size:13px;color:#38bdf8;cursor:pointer;margin-bottom:6px;font-weight:600}
.tip{font-size:11px;color:var(--muted);padding:4px 2px;margin-bottom:6px;line-height:1.5}
.offs{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:12px;margin-bottom:8px}
.offg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.offi{cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid transparent}
.offi:active{border-color:var(--red)}
.offi img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#222}
.offi .ofn{font-size:9px;padding:3px 4px;color:var(--muted);text-align:center;line-height:1.2;background:var(--bg)}
.sld{text-align:center;padding:16px;color:var(--muted);font-size:13px}
/* Scanner */
.scan-ov{position:fixed;inset:0;background:#000;z-index:998;display:flex;flex-direction:column}
.scan-head{background:var(--red);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.scan-head span{color:#fff;font-size:15px;font-weight:600}
.scan-body{flex:1;position:relative;overflow:hidden}
.scan-video{width:100%;height:100%;object-fit:cover}
.scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:220px;border:3px solid var(--red);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.55)}
.scan-anim{position:absolute;top:50%;left:50%;transform:translate(-50%,-100px);width:180px;height:3px;background:var(--red);animation:sc 2s infinite}
@keyframes sc{0%{transform:translate(-50%,-90px)}50%{transform:translate(-50%,90px)}100%{transform:translate(-50%,-90px)}}
.scan-hint{position:absolute;bottom:20px;left:0;right:0;color:#fff;font-size:13px;text-align:center}
.scan-res{position:absolute;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

/* Cropper */
.crop-ov{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center}
.crop-title{color:#fff;font-size:14px;margin-bottom:12px;font-weight:500}
.crop-vp{position:relative;width:300px;height:300px;overflow:hidden;border:3px solid var(--red);border-radius:8px;cursor:grab;touch-action:none}
.crop-vp img{position:absolute;transform-origin:0 0;will-change:transform;user-select:none;-webkit-user-drag:none}
.crop-hint{color:#aaa;font-size:11px;margin-top:10px;text-align:center}
.zoom-bar{display:flex;align-items:center;gap:10px;margin-top:12px}
.zoom-bar input{width:180px;accent-color:var(--red)}
.zoom-bar span{color:#fff;font-size:14px}
.crop-btns{display:flex;gap:12px;margin-top:16px}
.crop-btns button{padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.cc{background:var(--red);color:#fff}
.cx{background:#333;color:#fff}
</style>
</head>
<body>
<div class="hdr">
  <div><h1 id="hT">🍁 Canadian & American Market</h1><div class="sub" id="hS">Chargement...</div></div>
  <div style="display:flex;align-items:center;gap:6px">
    <span class="dot" id="dot"></span>
    <button class="btn-sw" onclick="togglePanel()">Changer ▾</button>
  </div>
</div>
<div class="content" id="ct"><div class="emp">Connexion Firebase...</div></div>
<div class="nav" id="nav"></div>

<!-- Scanner -->
<div class="scan-ov" id="scanOv" style="display:none">
  <div class="scan-head">
    <span>📷 Scanner un produit</span>
    <button style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer" onclick="closeScan()">✕ Fermer</button>
  </div>
  <div class="scan-body">
    <video id="scanVid" class="scan-video" autoplay playsinline muted></video>
    <div class="scan-frame"></div>
    <div class="scan-anim"></div>
    <div class="scan-hint">Pointez le code-barres dans le cadre rouge</div>
    <div class="scan-res" id="scanRes" style="display:none">
      <div id="scanImg" style="margin-bottom:12px"></div>
      <div id="scanNm" style="color:#fff;font-size:16px;font-weight:600;text-align:center;margin-bottom:6px"></div>
      <div id="scanDp" style="color:var(--muted);font-size:13px;margin-bottom:20px"></div>
      <div style="display:flex;gap:10px">
        <button onclick="useScan()" style="padding:12px 24px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">✓ Utiliser</button>
        <button onclick="retryScan()" style="padding:12px 24px;background:#333;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer">↺ Rescanner</button>
      </div>
    </div>
  </div>
</div>

<!-- Cropper -->
<div class="crop-ov" id="cropOv" style="display:none">
  <div class="crop-title">Centrez le produit dans le carré</div>
  <div class="crop-vp" id="cropVp"><img id="cropImg" draggable="false"></div>
  <div class="crop-hint">Glissez pour déplacer • Pincez pour zoomer</div>
  <div class="zoom-bar"><span>−</span><input type="range" id="zoomR" min="30" max="400" value="100" oninput="applyZoom(this.value)"><span>+</span></div>
  <div class="crop-btns">
    <button class="cx" onclick="closeCrop()">Annuler</button>
    <button class="cc" onclick="confirmCrop()">✓ Valider</button>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,onSnapshot,addDoc,updateDoc,deleteDoc,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db=getFirestore(initializeApp({
  apiKey:"AIzaSyC3vf083Qj1l-AxK79LPcvx8F1LdtMtdVw",
  authDomain:"canadian-american-stock.firebaseapp.com",
  projectId:"canadian-american-stock",
  storageBucket:"canadian-american-stock.firebasestorage.app",
  messagingSenderId:"916149478771",
  appId:"1:916149478771:web:7b25e704425dfbc207d106"
}));

let A={
  mode:localStorage.getItem('m')||'depot',
  shopId:localStorage.getItem('s')||null,
  shops:[],products:[],orders:[],depts:[],
  cart:JSON.parse(localStorage.getItem('c')||'[]'),
  tab:0,filter:'',
  prod:null,photo:null,form:null,offOpen:false,
  panel:false
};

window.addEventListener('online',()=>document.getElementById('dot').className='dot');
window.addEventListener('offline',()=>document.getElementById('dot').className='dot off');

onSnapshot(collection(db,'shops'),s=>{A.shops=s.docs.map(d=>({id:d.id,...d.data()}));render();});
onSnapshot(collection(db,'departments'),s=>{
  A.depts=s.docs.map(d=>({id:d.id,...d.data()})).filter(d=>d.name).sort((a,b)=>a.name.localeCompare(b.name));
  if(!A.depts.length)['Boissons','Candy','Mexicain','Produit Canadien','Boulangerie','Épicerie'].forEach(n=>addDoc(collection(db,'departments'),{name:n}));
  render();
});
onSnapshot(query(collection(db,'products'),orderBy('name')),s=>{A.products=s.docs.map(d=>({id:d.id,...d.data()}));render();});
onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),s=>{A.orders=s.docs.map(d=>({id:d.id,...d.data()}));render();});

function render(){
  const isD=A.mode==='depot';
  const sh=A.shops.find(s=>s.id===A.shopId);
  document.getElementById('hT').textContent=isD?'🍁 Entrepôt — Rodrigo':(sh?`🛒 ${sh.name}`:'🛒 Magasin');
  document.getElementById('hS').textContent=isD?'Gestion du stock':'Passer commande';
  isD?renderD():renderS();
}

function renderD(){
  const p=A.orders.filter(o=>o.status==='pending').length;
  document.getElementById('nav').innerHTML=`
    <button class="nb ${A.tab===0?'on':''}" onclick="DT(0)"><span class="ic">📦</span><span class="lb">Stock</span></button>
    <button class="nb ${A.tab===1?'on':''}" onclick="DT(1)"><span class="ic">➕</span><span class="lb">Produit</span></button>
    <button class="nb ${A.tab===2?'on':''}" onclick="DT(2)" style="position:relative"><span class="ic">📋</span><span class="lb">Commandes</span><span class="bdot ${p>0?'show':''}"></span></button>
    <button class="nb ${A.tab===3?'on':''}" onclick="DT(3)"><span class="ic">🏷</span><span class="lb">Rayons</span></button>`;
  renderDC();
}

function renderS(){
  const tot=A.cart.reduce((s,x)=>s+x.qty,0);
  document.getElementById('nav').innerHTML=`
    <button class="nb ${A.tab===0?'on':''}" onclick="ST(0)"><span class="ic">🛍</span><span class="lb">Commander</span></button>
    <button class="nb ${A.tab===1?'on':''}" onclick="ST(1)"><span class="ic">🛒</span><span class="lb">${tot>0?`Panier (${tot})`:'Panier'}</span></button>`;
  renderSC();
}

window.togglePanel=function(){A.panel=!A.panel;A.panel?renderPanel():render();}
window.DT=function(t){A.tab=t;A.panel=false;renderD();}
window.ST=function(t){A.tab=t;A.panel=false;renderS();}

function renderPanel(){
  let h=`<div class="mpanel"><div style="font-size:13px;font-weight:600;margin-bottom:10px">Sélectionner l'espace</div>
    <div class="mrow ${A.mode==='depot'?'on':''}" onclick="setM('depot','')">🏭 Entrepôt (Rodrigo)</div>`;
  A.shops.forEach(s=>h+=`<div class="mrow ${A.mode==='shop'&&A.shopId===s.id?'on':''}" onclick="setM('shop','${s.id}')">🏪 ${s.name}</div>`);
  h+=`<div style="display:flex;gap:8px;margin-top:10px">
    <input id="nsi" placeholder="Nom du magasin..." style="margin:0;flex:1">
    <button class="btn br" style="width:auto;padding:10px 14px;margin:0" onclick="addShop()">+</button>
  </div></div>`;
  document.getElementById('ct').innerHTML=h;
}

window.setM=function(m,sid){
  A.mode=m;A.shopId=sid||null;A.tab=0;A.panel=false;A.cart=[];A.form=null;
  localStorage.setItem('m',m);localStorage.setItem('s',sid||'');localStorage.setItem('c','[]');
  render();
}

window.addShop=async function(){
  const v=document.getElementById('nsi')?.value?.trim();if(!v)return;
  await addDoc(collection(db,'shops'),{name:v,createdAt:serverTimestamp()});
  document.getElementById('nsi').value='';
}

function renderDC(){
  const c=document.getElementById('ct');
  if(A.panel){renderPanel();return;}
  if(A.tab===0)c.innerHTML=buildStock();
  else if(A.tab===1)c.innerHTML=buildForm();
  else if(A.tab===2)c.innerHTML=buildOrders();
  else c.innerHTML=buildDepts();
}

function buildStock(){
  const pr=A.products.filter(p=>!A.filter||p.dept===A.filter);
  let chips=`<div class="dscr"><div class="chip ${!A.filter?'on':''}" onclick="fD('')">Tous</div>`;
  A.depts.forEach(d=>chips+=`<div class="chip ${A.filter===d.name?'on':''}" onclick="fD('${d.name}')">${d.name}</div>`);
  chips+='</div>';
  if(!pr.length)return chips+'<div class="emp">Aucun produit — cliquez ➕</div>';
  let g='<div class="pgrid">';
  pr.forEach(p=>{
    const tot=(p.cartons||0)*(p.ppc||12)+(p.pieces||0);
    const tc=(tot/(p.ppc||12)).toFixed(1);
    const th=p.photo&&p.photo.startsWith('data:')?`<img src="${p.photo}">`:`<div class="em">${p.photo||'📦'}</div>`;
    g+=`<div class="pc" onclick="editP('${p.id}')">
      ${p.rupture?'<span class="rt">Rupture</span>':''}
      <div class="psq">${th}</div>
      <div class="pi"><div class="pn">${p.name}</div><div class="pd">${p.dept||''}</div><div class="pq">${tc} ctn</div></div>
    </div>`;
  });
  g+='</div>';
  return chips+`<div class="card"><div class="ch">${pr.length} produit(s)</div><div class="cb">${g}</div></div>`;
}

window.fD=function(d){A.filter=d;DT(0);}
window.editP=function(id){A.prod=A.products.find(p=>p.id===id)||null;A.photo=A.prod?.photo||null;A.form=null;A.offOpen=false;A.tab=1;renderD();}

function saveF(){
  A.form={
    n:document.getElementById('fn')?.value||'',
    d:document.getElementById('fd')?.value||'',
    i:document.getElementById('fi')?.value||'',
    ca:document.getElementById('fca')?.value||'0',
    pi:document.getElementById('fpi')?.value||'0',
    pp:document.getElementById('fpp')?.value||'12',
    ex:document.getElementById('fex')?.value||'',
    ru:document.getElementById('fru')?.checked||false
  };
}

function buildForm(){
  const p=A.prod;
  const f=A.form||{};
  const nv=f.n!==undefined?f.n:(p?.name||'');
  const dv=f.d!==undefined?f.d:(p?.dept||'');
  const iv=f.i!==undefined?f.i:(p?.info||'');
  const cav=f.ca!==undefined?f.ca:(p?.cartons||0);
  const piv=f.pi!==undefined?f.pi:(p?.pieces||0);
  const ppv=f.pp!==undefined?f.pp:(p?.ppc||12);
  const exv=f.ex!==undefined?f.ex:(p?.exp||'');
  const ruv=f.ru!==undefined?f.ru:(p?.rupture||false);
  const dopts=A.depts.map(d=>`<option value="${d.name}" ${dv===d.name?'selected':''}>${d.name}</option>`).join('');
  const prev=A.photo&&A.photo.startsWith('data:')?`<div style="margin-bottom:8px"><img src="${A.photo}" style="width:90px;height:90px;object-fit:cover;border-radius:10px;border:2px solid var(--red)"></div>`:
    (A.photo?`<div style="font-size:36px;margin-bottom:8px;text-align:center">${A.photo}</div>`:'');

  let offHtml='';
  if(A.offOpen){
    offHtml=`<div class="offs">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:12px;font-weight:600;color:var(--text)">🥫 Open Food Facts</span>
        <button class="bsm" onclick="closeOFF()">✕</button>
      </div>
      <div id="offR"><div class="sld">Recherche en cours...</div></div>
    </div>`;
  }

  return `<div class="card"><div class="ch">${p?'Modifier':'Nouveau produit'}</div><div class="cb">
    <button onclick="openScan()" style="display:block;width:100%;padding:13px;background:#1a2a1a;border:2px solid #4ade80;border-radius:12px;text-align:center;font-size:14px;color:#4ade80;cursor:pointer;margin-bottom:12px;font-weight:600">📷 Scanner le code-barres</button>
    <label class="lbl">Nom *</label>
    <input id="fn" value="${nv}" placeholder="Ex: Dr Pepper 355ml" oninput="saveF()">
    <label class="lbl">Département *</label>
    <select id="fd" onchange="saveF()"><option value="">-- Choisir --</option>${dopts}</select>
    <label class="lbl">Informations</label>
    <textarea id="fi" oninput="saveF()">${iv}</textarea>
    <div class="r2">

window.calcT=function(){

}

async function searchOFF(q){
  const el=document.getElementById('offR');if(!el)return;
  el.innerHTML='<div class="sld">Recherche en cours...</div>';
  try{
    const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=24&fields=product_name,image_front_small_url,image_url`);
    const data=await r.json();
    const prods=(data.products||[]).filter(p=>p.image_front_small_url||p.image_url);
    if(!prods.length){el.innerHTML='<div class="sld">Aucun résultat. Essayez en anglais.</div>';return;}
    let g='<div class="offg">';
    prods.forEach(p=>{
      const img=p.image_front_small_url||p.image_url;
      const nm=(p.product_name||'').substring(0,18);
      g+=`<div class="offi" onclick="pickOFF('${img.replace(/'/g,"\\'")}')">
        <img src="${img}" loading="lazy" onerror="this.parentElement.style.display='none'">
        <div class="ofn">${nm}</div>
      </div>`;
    });
    g+='</div>';
    el.innerHTML=g;
  }catch(e){el.innerHTML='<div class="sld">Erreur de connexion.</div>';}
}

function buildOrders(){
  const showArc=A.showArc||false;
  const active=A.orders.filter(o=>!o.status||o.status==='pending'||o.status==='active');
  const archived=A.orders.filter(o=>o.status==='archived'||o.status==='delivered');

  const SCOL=[
    {bg:'#1e3a5f',tx:'#60a5fa',bd:'#1d4ed8'},
    {bg:'#1a3a1a',tx:'#4ade80',bd:'#15803d'},
    {bg:'#3a1a3a',tx:'#c084fc',bd:'#7c3aed'},
    {bg:'#3a2a00',tx:'#fbbf24',bd:'#b45309'},
    {bg:'#2a1a3a',tx:'#f472b6',bd:'#9d174d'},
  ];
  function scol(shopId){const i=A.shops.findIndex(s=>s.id===shopId);return SCOL[i%SCOL.length]||SCOL[0];}

  if(showArc){
    let h=`<button class="btn bo" style="margin-bottom:10px" onclick="toggleArc()">← Retour commandes</button>`;
    if(!archived.length)h+='<div class="emp">Aucun historique.</div>';
    archived.forEach(o=>{
      const c=scol(o.shopId);
      h+=`<div style="border-radius:12px;border:1.5px solid ${c.bd};margin-bottom:10px;overflow:hidden;opacity:0.6">
        <div style="background:${c.bg};padding:10px 14px;display:flex;justify-content:space-between">
          <div style="font-weight:600;color:${c.tx}">${o.shopName||'?'}</div>
          <div style="font-size:10px;color:${c.tx};opacity:.8">${o.date||''}</div>
        </div>
        <div style="padding:8px 14px;background:var(--white)">
          ${(o.items||[]).map(item=>{const p=A.products.find(x=>x.id===item.id);return`<div style="font-size:12px;color:var(--muted);padding:2px 0">${p?.name||'?'} — ${item.qty} ctn</div>`;}).join('')}
        </div>
      </div>`;
    });
    return h;
  }

  if(!active.length){
    return`<div class="emp">Aucune commande en cours.</div>
      ${archived.length?`<button class="btn bo" onclick="toggleArc()">📋 Historique (${archived.length})</button>`:''}`;
  }

  let html='';
  active.forEach(o=>{
    const c=scol(o.shopId);
    const allD=(o.items||[]).every(i=>i.done);
    const doneN=(o.items||[]).filter(i=>i.done).length;
    const tot=(o.items||[]).length;
    // Group items by department
    const deptMap={};
    (o.items||[]).forEach(item=>{
      const p=A.products.find(x=>x.id===item.id);
      const dept=p?.dept||'Autre';
      if(!deptMap[dept])deptMap[dept]=[];
      deptMap[dept].push({item,p});
    });

    let grid='';
    Object.keys(deptMap).sort().forEach(dept=>{
      grid+=`<div style="font-size:11px;font-weight:600;color:${c.tx};margin:8px 0 6px;padding:3px 8px;background:${c.bg};border-radius:6px;display:inline-block">${dept}</div>`;
      grid+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">';
      deptMap[dept].forEach(({item,p})=>{
        const done=item.done;
        const imgHtml=p?.photo&&p.photo.startsWith('data:')?
          `<img src="${p.photo}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;${done?'filter:grayscale(1);opacity:0.25':''}">`:
          `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;${done?'opacity:0.25':''}">${p?.photo||'📦'}</div>`;
        grid+=`<div onclick="togD('${o.id}','${item.id}')" style="border-radius:10px;overflow:hidden;cursor:pointer;position:relative;border:2px solid ${done?c.bd:'#333'};background:#1a1a1a">
          <div style="padding-top:100%;position:relative">${imgHtml}</div>
          ${done?`<div style="position:absolute;top:4px;right:4px;background:${c.bd};color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">✓</div>`:''}
          <div style="padding:4px 6px;background:${done?c.bg:'#111'}">
            <div style="font-size:9px;font-weight:600;color:${done?c.tx:'var(--muted)'};line-height:1.2;${done?'text-decoration:line-through':''};overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${p?.name||'?'}</div>
            <div style="font-size:10px;color:${c.tx};font-weight:700">${item.qty} ctn</div>
          </div>
        </div>`;
      });
      grid+='</div>';
    });
    html+=`<div style="border-radius:14px;border:2px solid ${c.bd};margin-bottom:14px;overflow:hidden">
      <div style="background:${c.bg};padding:12px 14px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;font-size:15px;color:${c.tx}">${o.shopName||'?'}</div>
          <div style="font-size:10px;color:${c.tx};opacity:.75">${o.date||''}</div>
        </div>
        <div style="background:rgba(255,255,255,0.15);color:${c.tx};padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600">${doneN}/${tot}</div>
      </div>
      <div style="padding:12px;background:var(--white)">
        <div style="margin-bottom:10px">${grid}</div>
        ${allD?
          `<button onclick="deliverOrd('${o.id}')" style="width:100%;padding:12px;background:${c.bd};color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">✅ Commande livrée — Archiver</button>`:
          `<div style="font-size:12px;color:var(--muted);text-align:center;padding:4px">Appuyez sur chaque produit pour le valider</div>`
        }
      </div>
    </div>`;
  });

  if(archived.length){
    html+=`<button class="btn bo" onclick="toggleArc()">📋 Historique (${archived.length} commande${archived.length>1?'s':''})</button>`;
  }
  return html;
}

let SS={stream:null,interval:null,data:null};

window.openScan=function(){
  saveForm();

  document.getElementById('scanRes').style.display='none';

async function startCam(){
  try{
    SS.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=document.getElementById('scanVid');
    v.srcObject=SS.stream;v.play();
    if(!window.ZXing){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/umd/index.min.js';
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
    }
    startScan();
  }catch(e){alert('Caméra inaccessible: '+e.message);closeScan();}
}

function startScan(){
  const reader=new ZXing.MultiFormatReader();
  const hints=new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
    ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.UPC_A,ZXing.BarcodeFormat.UPC_E,
    ZXing.BarcodeFormat.CODE_128
  ]);
  reader.setHints(hints);
  const v=document.getElementById('scanVid');
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');
  SS.interval=setInterval(()=>{
    if(v.readyState!==v.HAVE_ENOUGH_DATA)return;
    canvas.width=v.videoWidth;canvas.height=v.videoHeight;
    ctx.drawImage(v,0,0);
    try{
      const id=ctx.getImageData(0,0,canvas.width,canvas.height);
      const lum=new ZXing.RGBLuminanceSource(id.data,canvas.width,canvas.height);
      const bmp=new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
      const r=reader.decode(bmp);
      if(r){clearInterval(SS.interval);lookupCode(r.getText());}
    }catch(e){}
  },250);
}

async function lookupCode(code){
  stopCam();
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const data=await r.json();
    if(data.status===1&&data.product){
      const p=data.product;
      const name=p.product_name||p.product_name_en||p.generic_name||'';
      const cats=(p.categories||'').toLowerCase();
      let dept='Épicerie';
      if(cats.includes('beverage')||cats.includes('drink')||cats.includes('soda')||cats.includes('boiss'))dept='Boissons';
      else if(cats.includes('candy')||cats.includes('confect')||cats.includes('sweet'))dept='Candy';
      else if(cats.includes('mexican')||cats.includes('salsa')||cats.includes('taco'))dept='Mexicain';
      else if(cats.includes('canadian')||cats.includes('maple')||cats.includes('sirop'))dept='Produit Canadien';
      else if(cats.includes('bread')||cats.includes('bakery')||cats.includes('boulang'))dept='Boulangerie';
      const img=p.image_front_url||p.image_url||'';
      SS.data={name,dept,img,code};
      document.getElementById('scanNm').textContent=name||'Produit inconnu';
      document.getElementById('scanDp').textContent=dept;
      const imgEl=document.getElementById('scanImg');
      imgEl.innerHTML=img?`<img src="${img}" style="width:120px;height:120px;object-fit:cover;border-radius:12px;border:2px solid var(--red)" onerror="this.style.display='none'">`:`<div style="font-size:48px">📦</div>`;
      document.getElementById('scanRes').style.display='flex';
    }else{
      alert(`Produit non trouvé (${code}). Essayez de rescanner.`);
      retryScan();
    }
  }catch(e){alert('Erreur connexion.');retryScan();}
}

function stopCam(){
  clearInterval(SS.interval);
  if(SS.stream){SS.stream.getTracks().forEach(t=>t.stop());SS.stream=null;}
}

window.useScan=function(){
  if(!SS.data)return;
  A.form=A.form||{};
  if(SS.data.name)A.form.name=SS.data.name;
  if(SS.data.dept)A.form.dept=SS.data.dept;
  const img=SS.data.img;
  closeScan();
  if(img){
    openCrop(img,data=>{A.photo=data;dTab(1);restoreForm();});
  }else{dTab(1);restoreForm();}
}

window.retryScan=function(){
  document.getElementById('scanRes').style.display='none';
  SS.data=null;startCam();
}

window.closeScan=function(){
  stopCam();
  document.getElementById('scanOv').style.display='none';
}

// ── Cropper ──
let CR={x:0,y:0,sc:1,sx:0,sy:0,drag:false,cb:null};

function openCrop(src,cb){
  CR.cb=cb;CR.x=0;CR.y=0;CR.sc=1;
  const ov=document.getElementById('cropOv');
  const img=document.getElementById('cropImg');
  ov.style.display='flex';
  img.onload=function(){
    const vw=300;
    const sc=Math.max(vw/img.naturalWidth,vw/img.naturalHeight);
    CR.sc=sc;
    document.getElementById('zoomR').value=Math.round(sc*100);
    CR.x=-(img.naturalWidth*sc-vw)/2;
    CR.y=-(img.naturalHeight*sc-vw)/2;
    applyT();
  };
  img.crossOrigin='anonymous';
  img.src=src;
  setupCrop();
}

function applyT(){
  document.getElementById('cropImg').style.transform=`translate(${CR.x}px,${CR.y}px) scale(${CR.sc})`;
}

window.applyZoom=function(v){
  const ns=v/100,vw=300,cx=vw/2,cy=vw/2;
  CR.x=cx-(cx-CR.x)*(ns/CR.sc);CR.y=cy-(cy-CR.y)*(ns/CR.sc);CR.sc=ns;applyT();
}

function setupCrop(){
  const vp=document.getElementById('cropVp');
  let ltd=0,ltm={x:0,y:0};
  vp.onmousedown=e=>{CR.drag=true;CR.sx=e.clientX-CR.x;CR.sy=e.clientY-CR.y;};
  window.onmousemove=e=>{if(!CR.drag)return;CR.x=e.clientX-CR.sx;CR.y=e.clientY-CR.sy;applyT();};
  window.onmouseup=()=>CR.drag=false;
  vp.ontouchstart=e=>{
    if(e.touches.length===1){CR.drag=true;CR.sx=e.touches[0].clientX-CR.x;CR.sy=e.touches[0].clientY-CR.y;}
    else if(e.touches.length===2){CR.drag=false;ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
    e.preventDefault();
  };
  vp.ontouchmove=e=>{
    if(e.touches.length===1&&CR.drag){CR.x=e.touches[0].clientX-CR.sx;CR.y=e.touches[0].clientY-CR.sy;applyT();}
    else if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const ns=Math.min(Math.max(CR.sc*(d/ltd),0.3),5);
      const rect=vp.getBoundingClientRect();
      const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
      const my=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;
      CR.x=mx-(mx-CR.x)*(ns/CR.sc);CR.y=my-(my-CR.y)*(ns/CR.sc);CR.sc=ns;
      document.getElementById('zoomR').value=Math.round(ns*100);ltd=d;applyT();
    }
    e.preventDefault();
  };
  vp.ontouchend=()=>CR.drag=false;
}

window.closeCrop=function(){document.getElementById('cropOv').style.display='none';}
window.confirmCrop=function(){
  const canvas=document.createElement('canvas');canvas.width=300;canvas.height=300;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(document.getElementById('cropImg'),-CR.x/CR.sc,-CR.y/CR.sc,300/CR.sc,300/CR.sc,0,0,300,300);
  document.getElementById('cropOv').style.display='none';
  if(CR.cb)CR.cb(canvas.toDataURL('image/jpeg',0.85));
}
</script>
