<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C8102E">
<title>Canadian & American Market — Stock</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{--red:#C8102E;--red2:#8B0B1F;--red-bg:#3a0a10;--bg:#121212;--white:#1e1e1e;--border:#333;--text:#f0f0f0;--muted:#999;--green:#22c55e;--green-bg:#14532d}
@media(prefers-color-scheme:light){:root{--red:#C8102E;--red2:#8B0B1F;--red-bg:#fdf0f2;--bg:#f4f4f4;--white:#fff;--border:#e5e5e5;--text:#1a1a1a;--muted:#666;--green:#16a34a;--green-bg:#dcfce7}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.header{background:var(--red);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:600}
.header .sub{font-size:11px;opacity:.8;margin-top:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:4px}
.sync-dot.off{background:#f87171}
.btn-switch{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer}
.content{flex:1;padding:12px;padding-bottom:80px}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 12px;border:none;background:none;cursor:pointer;position:relative}
.navbtn .ico{font-size:22px;line-height:1}
.navbtn .lbl{font-size:9px;color:var(--muted);margin-top:3px;font-weight:500}
.navbtn.active .lbl{color:var(--red)}
.badge-dot{position:absolute;top:6px;right:calc(50% - 18px);width:8px;height:8px;background:var(--red);border-radius:50%;display:none}
.badge-dot.show{display:block}
.card{background:var(--white);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.card-head{padding:12px 14px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-body{padding:12px 14px}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.prod-card{background:var(--bg);border-radius:10px;overflow:hidden;cursor:pointer;position:relative;border:2px solid transparent}
.prod-card.selected{border-color:var(--red)}
.prod-sq{width:100%;padding-top:100%;position:relative;background:#f5f5f5}
.prod-sq img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.prod-sq .prod-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px}
.prod-info{padding:5px 6px 7px}
.prod-name{font-size:10px;font-weight:600;line-height:1.2;color:var(--text)}
.prod-dept{font-size:9px;color:var(--muted);margin-top:1px}
.prod-qty{font-size:9px;color:var(--red);font-weight:600;margin-top:2px}
.qty-bubble{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;font-size:11px;font-weight:700;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 4px;z-index:2}
.rupt-tag{position:absolute;top:4px;left:4px;background:#fee2e2;color:#991b1b;font-size:8px;padding:2px 5px;border-radius:6px;font-weight:600;z-index:2}
.btn{display:block;width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-red{background:var(--red);color:#fff}
.btn-out{background:var(--white);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:8px;border:1px solid var(--border);background:var(--white);cursor:pointer}
.btn-sm.danger{color:#991b1b;border-color:#fca5a5;background:#fee2e2}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:var(--white);margin-bottom:8px;outline:none;color-scheme:dark light}
input:focus,select:focus,textarea:focus{border-color:var(--red)}
textarea{min-height:56px;resize:none}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:3px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.total-pill{background:var(--red-bg);color:var(--red2);border-radius:10px;padding:9px 12px;font-size:12px;font-weight:600;margin-bottom:8px}
.order-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.order-row:last-child{border:none}
.chk{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:13px;color:#fff}
.chk.done{background:var(--green);border-color:var(--green)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag-red{background:var(--red-bg);color:var(--red2)}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-gray{background:#f3f4f6;color:#6b7280}
.dept-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.dept-scroll::-webkit-scrollbar{display:none}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip.active{background:var(--red-bg);color:var(--red2);border-color:transparent;font-weight:600}
.mode-panel{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:12px}
.mode-row{padding:10px 12px;border-radius:10px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;font-size:13px;font-weight:500}
.mode-row.active{background:var(--red);color:#fff;border-color:transparent}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.dept-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.dept-item:last-child{border:none}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.photo-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.photo-btn{padding:8px 4px;background:var(--bg);border:1px solid var(--border);border-radius:10px;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;display:block;line-height:1.4}
.photo-btn .ico{font-size:18px;display:block;margin-bottom:3px}
.photo-btn-search{display:block;width:100%;padding:11px;background:#fdf0f2;border:1.5px solid #C8102E;border-radius:10px;text-align:center;font-size:13px;color:#C8102E;cursor:pointer;margin-bottom:8px;font-weight:600}


/* ── Image Browser ── */
.imgbrowser-overlay{position:fixed;inset:0;background:#000;z-index:998;display:flex;flex-direction:column}
.imgbrowser-header{background:var(--red);padding:10px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.imgbrowser-header input{flex:1;padding:8px 12px;border-radius:20px;border:none;font-size:14px;background:#fff;color:#000;outline:none}
.imgbrowser-search-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap}
.imgbrowser-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 4px;flex-shrink:0}
.imgbrowser-grid{flex:1;overflow-y:auto;padding:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:#0a0a0a}
.imgbrowser-item{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;background:#1a1a1a;border:2px solid transparent;transition:border-color .15s}
.imgbrowser-item:active{border-color:var(--red)}
.imgbrowser-item img{width:100%;height:100%;object-fit:cover;display:block}
.imgbrowser-loading{grid-column:1/-1;text-align:center;padding:40px;color:#666;font-size:14px}
.imgbrowser-hint{grid-column:1/-1;text-align:center;padding:20px;color:#555;font-size:12px}

/* ── Cropper overlay ── */
.cropper-overlay{position:fixed;inset:0;background:#0a0a0a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cropper-title{color:#fff;font-size:14px;margin-bottom:12px;font-weight:500}
.cropper-viewport{position:relative;width:300px;height:300px;overflow:hidden;border:3px solid var(--red);border-radius:8px;cursor:grab;touch-action:none}
.cropper-viewport img{position:absolute;transform-origin:0 0;will-change:transform}
.cropper-hint{color:#aaa;font-size:11px;margin-top:10px;text-align:center}
.cropper-btns{display:flex;gap:12px;margin-top:16px}
.cropper-btns button{padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.cropper-confirm{background:var(--red);color:#fff}
.cropper-cancel{background:#333;color:#fff}
.zoom-bar{display:flex;align-items:center;gap:10px;margin-top:12px}
.zoom-bar input{width:180px;accent-color:var(--red)}
.zoom-bar span{color:#fff;font-size:12px}

/* ── OFF search panel ── */
.off-search{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px}
.off-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.off-item{cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid transparent;transition:border-color .15s}
.off-item:hover{border-color:var(--red)}
.off-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f5f5f5}
.off-item .off-name{font-size:9px;padding:3px 4px;color:var(--muted);text-align:center;line-height:1.2}
.search-loading{text-align:center;padding:20px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1 id="hTitle">🍁 Canadian & American Market</h1>
    <div class="sub" id="hSub">Chargement...</div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span class="sync-dot" id="syncDot"></span>
    <button class="btn-switch" onclick="togglePanel()">Changer ▾</button>
  </div>
</div>

<div class="content" id="content"><div class="empty">Connexion...</div></div>
<div class="bottomnav" id="bottomNav"></div>


<!-- Image Browser -->
<div class="imgbrowser-overlay" id="imgBrowser" style="display:none">
  <div class="imgbrowser-header">
    <button class="imgbrowser-close" onclick="closeImgBrowser()">✕</button>
    <input id="imgBrowserQuery" placeholder="Chercher une image..." onkeydown="if(event.key==='Enter')searchImages()">
    <button class="imgbrowser-search-btn" onclick="searchImages()">Chercher</button>
  </div>
  <div class="imgbrowser-grid" id="imgBrowserGrid">
    <div class="imgbrowser-hint">Tapez un nom de produit et cherchez</div>
  </div>
</div>

<!-- Cropper overlay -->
<div class="cropper-overlay" id="cropOverlay" style="display:none">
  <div class="cropper-title">Centrez le produit dans le carré</div>
  <div class="cropper-viewport" id="cropViewport">
    <img id="cropImg" draggable="false">
  </div>
  <div class="cropper-hint">Glissez pour déplacer • Pincez pour zoomer</div>
  <div class="zoom-bar">
    <span>−</span>
    <input type="range" id="zoomRange" min="50" max="300" value="100" oninput="applyZoom(this.value)">
    <span>+</span>
  </div>
  <div class="cropper-btns">
    <button class="cropper-cancel" onclick="closeCropper()">Annuler</button>
    <button class="cropper-confirm" onclick="confirmCrop()">✓ Valider</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC3vf083Qj1l-AxK79LPcvx8F1LdtMtdVw",
  authDomain: "canadian-american-stock.firebaseapp.com",
  projectId: "canadian-american-stock",
  storageBucket: "canadian-american-stock.firebasestorage.app",
  messagingSenderId: "916149478771",
  appId: "1:916149478771:web:7b25e704425dfbc207d106"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let S = {
  mode: localStorage.getItem('cam_mode') || 'depot',
  currentShopId: localStorage.getItem('cam_shop') || null,
  shops: [], products: [], orders: [], depts: [],
  cart: JSON.parse(localStorage.getItem('cam_cart') || '[]'),
  filterDept: '', currentTab: 0,
  editingProduct: null, photoData: null,
  showPanel: false, showOFFSearch: false
};

// ── Cropper state ──────────────────────────────────────
let crop = { x:0, y:0, scale:1, startX:0, startY:0, dragging:false, imgW:0, imgH:0, onConfirm:null };

window.addEventListener('online', ()=>document.getElementById('syncDot').className='sync-dot');
window.addEventListener('offline', ()=>document.getElementById('syncDot').className='sync-dot off');

// ── Firebase listeners ─────────────────────────────────
onSnapshot(collection(db,'shops'), snap=>{ S.shops=snap.docs.map(d=>({id:d.id,...d.data()})); render(); });
onSnapshot(collection(db,'departments'), snap=>{
  S.depts=snap.docs.map(d=>({id:d.id,...d.data()})).filter(d=>d.name).sort((a,b)=>a.name.localeCompare(b.name));
  if(!S.depts.length) initDepts();
  render();
});
onSnapshot(query(collection(db,'products'),orderBy('name')), snap=>{ S.products=snap.docs.map(d=>({id:d.id,...d.data()})); render(); });
onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')), snap=>{ S.orders=snap.docs.map(d=>({id:d.id,...d.data()})); render(); });

async function initDepts(){
  for(const name of ['Boissons','Candy','Mexicain','Produit Canadien','Boulangerie','Épicerie'])
    await addDoc(collection(db,'departments'),{name});
}

// ── Render ─────────────────────────────────────────────
function render(){
  const isDepot=S.mode==='depot';
  const shop=S.shops.find(s=>s.id===S.currentShopId);
  document.getElementById('hTitle').textContent=isDepot?'🍁 Entrepôt — Rodrigo':(shop?`🛒 ${shop.name}`:'🛒 Magasin');
  document.getElementById('hSub').textContent=isDepot?'Gestion du stock':'Passer commande';
  isDepot?renderDepotNav():renderShopNav();
}

function renderDepotNav(){
  const pending=S.orders.filter(o=>o.status==='pending').length;
  document.getElementById('bottomNav').innerHTML=`
    <button class="navbtn ${S.currentTab===0?'active':''}" onclick="depotTab(0)"><span class="ico">📦</span><span class="lbl">Stock</span></button>
    <button class="navbtn ${S.currentTab===1?'active':''}" onclick="depotTab(1)"><span class="ico">➕</span><span class="lbl">Produit</span></button>
    <button class="navbtn ${S.currentTab===2?'active':''}" onclick="depotTab(2)" style="position:relative"><span class="ico">📋</span><span class="lbl">Commandes</span><span class="badge-dot ${pending>0?'show':''}"></span></button>
    <button class="navbtn ${S.currentTab===3?'active':''}" onclick="depotTab(3)"><span class="ico">🏷</span><span class="lbl">Rayons</span></button>`;
  renderDepotContent();
}

function renderShopNav(){
  const total=S.cart.reduce((s,x)=>s+x.qty,0);
  document.getElementById('bottomNav').innerHTML=`
    <button class="navbtn ${S.currentTab===0?'active':''}" onclick="shopTab(0)"><span class="ico">🛍</span><span class="lbl">Commander</span></button>
    <button class="navbtn ${S.currentTab===1?'active':''}" onclick="shopTab(1)"><span class="ico">🛒</span><span class="lbl">${total>0?`Panier (${total})`:'Panier'}</span></button>`;
  renderShopContent();
}

window.togglePanel=function(){ S.showPanel=!S.showPanel; S.showPanel?renderPanel():render(); }
window.depotTab=function(t){ S.currentTab=t; S.showPanel=false; renderDepotNav(); }
window.shopTab=function(t){ S.currentTab=t; S.showPanel=false; renderShopNav(); }

function renderPanel(){
  let html=`<div class="mode-panel">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Sélectionner l'espace</div>
    <div class="mode-row ${S.mode==='depot'?'active':''}" onclick="setMode('depot','')">🏭 Entrepôt (Rodrigo)</div>`;
  S.shops.forEach(s=>html+=`<div class="mode-row ${S.mode==='shop'&&S.currentShopId===s.id?'active':''}" onclick="setMode('shop','${s.id}')">🏪 ${s.name}</div>`);
  html+=`<div style="display:flex;gap:8px;margin-top:10px">
    <input id="newShopIn" placeholder="Nom du magasin..." style="margin:0;flex:1">
    <button class="btn btn-red" style="width:auto;padding:10px 14px;margin:0" onclick="addShop()">+</button>
  </div></div>`;
  document.getElementById('content').innerHTML=html;
}

window.setMode=function(mode,shopId){
  S.mode=mode; S.currentShopId=shopId||null; S.currentTab=0; S.showPanel=false; S.cart=[];
  localStorage.setItem('cam_mode',mode); localStorage.setItem('cam_shop',shopId||''); localStorage.setItem('cam_cart','[]');
  render();
}

window.addShop=async function(){
  const inp=document.getElementById('newShopIn'); const name=inp?.value?.trim(); if(!name) return;
  await addDoc(collection(db,'shops'),{name,createdAt:serverTimestamp()}); inp.value='';
}

function renderDepotContent(){
  const c=document.getElementById('content');
  if(S.showPanel){renderPanel();return;}
  if(S.currentTab===0) c.innerHTML=buildStock();
  else if(S.currentTab===1) c.innerHTML=buildAddProduct();
  else if(S.currentTab===2) c.innerHTML=buildOrders();
  else c.innerHTML=buildDepts();
}

// ── Stock ──────────────────────────────────────────────
function buildStock(){
  const prods=S.products.filter(p=>!S.filterDept||p.dept===S.filterDept);
  let chips=`<div class="dept-scroll"><div class="chip ${!S.filterDept?'active':''}" onclick="filterDept('')">Tous</div>`;
  S.depts.forEach(d=>chips+=`<div class="chip ${S.filterDept===d.name?'active':''}" onclick="filterDept('${d.name}')">${d.name}</div>`);
  chips+='</div>';
  if(!prods.length) return chips+'<div class="empty">Aucun produit — cliquez ➕ pour en ajouter</div>';
  let grid='<div class="prod-grid">';
  prods.forEach(p=>{
    const tot=(p.cartons||0)*(p.ppc||12)+(p.pieces||0);
    const tc=(tot/(p.ppc||12)).toFixed(1);
    const thumb=p.photo&&p.photo.startsWith('data:')?`<img src="${p.photo}">`:`<div class="prod-emoji">${p.photo||'📦'}</div>`;
    grid+=`<div class="prod-card" onclick="editProduct('${p.id}')">
      ${p.rupture?'<span class="rupt-tag">Rupture</span>':''}
      <div class="prod-sq">${thumb}</div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-dept">${p.dept||''}</div>
        <div class="prod-qty">${tc} ctn</div>
      </div>
    </div>`;
  });
  grid+='</div>';
  return chips+`<div class="card"><div class="card-head">${prods.length} produit(s)</div><div class="card-body">${grid}</div></div>`;
}

window.filterDept=function(d){S.filterDept=d;depotTab(0);}
window.editProduct=function(id){
  S.editingProduct=S.products.find(p=>p.id===id)||null;
  S.photoData=S.editingProduct?.photo||null; S.showOFFSearch=false;
  S.currentTab=1; renderDepotNav();
}

// ── Add Product ────────────────────────────────────────
function buildAddProduct(){
  const p=S.editingProduct;
  // Use saved form state if available
  const f=S._form||{};
  const nameVal=f.name!==undefined?f.name:(p?.name||'');
  const deptVal=f.dept!==undefined?f.dept:(p?.dept||'');
  const infoVal=f.info!==undefined?f.info:(p?.info||'');
  const cartonsVal=f.cartons!==undefined?f.cartons:(p?.cartons||0);
  const piecesVal=f.pieces!==undefined?f.pieces:(p?.pieces||0);
  const ppcVal=f.ppc!==undefined?f.ppc:(p?.ppc||12);
  const expVal=f.exp!==undefined?f.exp:(p?.exp||'');
  const ruptVal=f.rupt!==undefined?f.rupt:(p?.rupture||false);
  const deptOpts=S.depts.map(d=>`<option value="${d.name}" ${deptVal===d.name?'selected':''}>${d.name}</option>`).join('');
  const photoPreviewHtml=S.photoData&&S.photoData.startsWith('data:')?
    `<div style="margin-bottom:8px"><img src="${S.photoData}" style="width:100px;height:100px;object-fit:cover;border-radius:10px;border:2px solid var(--red)"></div>`:
    (S.photoData?`<div style="font-size:40px;margin-bottom:8px;text-align:center">${S.photoData}</div>`:'');

  let offSearchHtml='';
  if(S.showOFFSearch){
    offSearchHtml=`<div class="off-search">
      <div style="font-size:12px;font-weight:600;margin-bottom:8px">🔍 Recherche Open Food Facts</div>
      <div style="display:flex;gap:8px">
        <input id="offQuery" placeholder="Nom du produit en anglais..." style="margin:0;flex:1" value="${p?.name||''}">
        <button class="btn btn-red" style="width:auto;padding:8px 12px;margin:0;font-size:12px" onclick="searchOFF()">Chercher</button>
      </div>
      <div id="offResults"><div style="color:var(--muted);font-size:12px;margin-top:8px">Tapez un nom et cherchez...</div></div>
    </div>`;
  }

  return `<div class="card"><div class="card-head">${p?'Modifier':'Nouveau produit'}</div><div class="card-body">

window.calcTotal=function(){

}

window.searchOFF=async function(){
  const q=document.getElementById('offQuery')?.value?.trim(); if(!q) return;
  const res=document.getElementById('offResults');
  res.innerHTML='<div class="search-loading">Recherche en cours...</div>';
  try{
    const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=9&fields=product_name,image_url,image_front_small_url`;
    const r=await fetch(url);
    const data=await r.json();
    const products=(data.products||[]).filter(p=>p.image_front_small_url||p.image_url);
    if(!products.length){res.innerHTML='<div style="color:var(--muted);font-size:12px;margin-top:8px">Aucun résultat. Essayez en anglais.</div>';return;}
    let grid='<div class="off-grid">';
    products.slice(0,9).forEach(p=>{
      const img=p.image_front_small_url||p.image_url;
      const name=(p.product_name||'').substring(0,20);
      grid+=`<div class="off-item" onclick="selectOFFImage('${img}','${name.replace(/'/g,"\\'")}')">
        <img src="${img}" loading="lazy" onerror="this.style.display='none'">
        <div class="off-name">${name}</div>
      </div>`;
    });
    grid+='</div>';
    res.innerHTML=grid;
  }catch(e){res.innerHTML='<div style="color:#991b1b;font-size:12px;margin-top:8px">Erreur de connexion. Vérifiez internet.</div>';}
}

window.searchImages = async function(){
  const q = document.getElementById('imgBrowserQuery')?.value?.trim();
  if(!q) return;
  const grid = document.getElementById('imgBrowserGrid');
  grid.innerHTML='<div class="imgbrowser-loading">Recherche en cours...</div>';
  // Search both sources simultaneously
  const [offResults, unsplashResults] = await Promise.allSettled([
    fetchOFFImages(q),
    fetchUnsplashImages(q)
  ]);
  let images = [];
  if(unsplashResults.status==='fulfilled') images = images.concat(unsplashResults.value);
  if(offResults.status==='fulfilled') images = images.concat(offResults.value);
  if(!images.length){
    grid.innerHTML='<div class="imgbrowser-hint">Aucun résultat. Essayez en anglais (ex: "Dr Pepper can")</div>';
    return;
  }
  renderImageGrid(images.slice(0,24));
}

async function fetchUnsplashImages(q){
  // Use Unsplash via their CDN - works without API key for basic searches
  const images = [];
  const seeds = ['a','b','c','d','e','f','g','h','i','j','k','l'];
  seeds.forEach(seed=>{
    images.push({
      url: `https://source.unsplash.com/featured/300x300/?${encodeURIComponent(q+' food product')}&${seed}`,
      title: q
    });
  });
  return images;
}

async function fetchOFFImages(q){
  const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=12&fields=product_name,image_front_small_url,image_url`;
  const r=await fetch(url);
  const data=await r.json();
  return (data.products||[])
    .filter(p=>p.image_front_small_url||p.image_url)
    .map(p=>({url:p.image_front_small_url||p.image_url, title:p.product_name||''}));
}



function renderImageGrid(images){
  const grid = document.getElementById('imgBrowserGrid');
  if(!images.length){ grid.innerHTML='<div class="imgbrowser-hint">Aucun résultat.</div>'; return; }
  grid.innerHTML = images.map((img,i)=>
    `<div class="imgbrowser-item" onclick="selectBrowserImage('${img.url.replace(/'/g,"\'")}')">
      <img src="${img.url}" loading="lazy" onerror="this.parentElement.style.display='none'">
    </div>`
  ).join('');
}

window.selectBrowserImage = function(url){
  closeImgBrowser();
  // Load image and open cropper
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function(){
    const canvas = document.createElement('canvas');
    canvas.width = img.width; canvas.height = img.height;
    canvas.getContext('2d').drawImage(img,0,0);
    try {
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      openCropper(dataUrl, (croppedData)=>{
        S.photoData = croppedData;
        S.showOFFSearch = false;
        restoreFormAndRebuild();
      });
    } catch(e) {
      // If CORS fails, use URL directly and open cropper
      openCropper(url, (croppedData)=>{
        S.photoData = croppedData;
        S.showOFFSearch = false;
        restoreFormAndRebuild();
      });
    }
  };
  img.onerror = function(){
    // Try directly with cropper
    openCropper(url, (croppedData)=>{
      S.photoData = croppedData;
      S.showOFFSearch = false;
      restoreFormAndRebuild();
    });
  };
  img.src = url;
}

function restoreFormAndRebuild(){
  // S._form already has the saved state - buildAddProduct will use it automatically

  setTimeout(()=>calcTotal(),100);
}

// ── Cropper ────────────────────────────────────────────
function openCropper(src, onConfirm){
  crop.onConfirm=onConfirm; crop.x=0; crop.y=0; crop.scale=1;
  const overlay=document.getElementById('cropOverlay');
  const img=document.getElementById('cropImg');
  overlay.style.display='flex';
  img.onload=function(){
    crop.imgW=img.naturalWidth; crop.imgH=img.naturalHeight;
    const vw=300;
    const scaleToFit=Math.max(vw/crop.imgW, vw/crop.imgH);
    crop.scale=scaleToFit;
    document.getElementById('zoomRange').value=Math.round(scaleToFit*100);
    // Center
    crop.x=-(crop.imgW*crop.scale-vw)/2;
    crop.y=-(crop.imgH*crop.scale-vw)/2;
    applyTransform();
  };
  img.src=src;
  setupCropperEvents();
}

window.applyZoom=function(val){
  const vw=300;
  const newScale=val/100;
  const cx=vw/2; const cy=vw/2;
  crop.x=cx-(cx-crop.x)*(newScale/crop.scale);
  crop.y=cy-(cy-crop.y)*(newScale/crop.scale);
  crop.scale=newScale;
  applyTransform();
}

function applyTransform(){
  const img=document.getElementById('cropImg');
  img.style.transform=`translate(${crop.x}px,${crop.y}px) scale(${crop.scale})`;
}

function setupCropperEvents(){
  const vp=document.getElementById('cropViewport');
  let lastTouchDist=0; let lastTouchMid={x:0,y:0};

  vp.onmousedown=e=>{crop.dragging=true;crop.startX=e.clientX-crop.x;crop.startY=e.clientY-crop.y;};
  window.onmousemove=e=>{if(!crop.dragging)return;crop.x=e.clientX-crop.startX;crop.y=e.clientY-crop.startY;applyTransform();};
  window.onmouseup=()=>{crop.dragging=false;};

  vp.ontouchstart=e=>{
    if(e.touches.length===1){
      crop.dragging=true;
      crop.startX=e.touches[0].clientX-crop.x;
      crop.startY=e.touches[0].clientY-crop.y;
    } else if(e.touches.length===2){
      crop.dragging=false;
      lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      lastTouchMid={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    }
    e.preventDefault();
  };

  vp.ontouchmove=e=>{
    if(e.touches.length===1&&crop.dragging){
      crop.x=e.touches[0].clientX-crop.startX;
      crop.y=e.touches[0].clientY-crop.startY;
      applyTransform();
    } else if(e.touches.length===2){
      const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const ratio=dist/lastTouchDist;
      const newScale=Math.min(Math.max(crop.scale*ratio,0.3),5);
      const mid={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
      const rect=document.getElementById('cropViewport').getBoundingClientRect();
      const cx=mid.x-rect.left; const cy=mid.y-rect.top;
      crop.x=cx-(cx-crop.x)*(newScale/crop.scale);
      crop.y=cy-(cy-crop.y)*(newScale/crop.scale);
      crop.scale=newScale;
      document.getElementById('zoomRange').value=Math.round(crop.scale*100);
      lastTouchDist=dist; lastTouchMid=mid;
      applyTransform();
    }
    e.preventDefault();
  };

  vp.ontouchend=()=>{crop.dragging=false;};
}

window.closeCropper=function(){
  document.getElementById('cropOverlay').style.display='none';
}

window.confirmCrop=function(){
  const canvas=document.createElement('canvas');
  canvas.width=300; canvas.height=300;
  const ctx=canvas.getContext('2d');
  const img=document.getElementById('cropImg');
  ctx.drawImage(img, -crop.x/crop.scale, -crop.y/crop.scale, 300/crop.scale, 300/crop.scale, 0, 0, 300, 300);
  const result=canvas.toDataURL('image/jpeg',0.85);
  document.getElementById('cropOverlay').style.display='none';
  if(crop.onConfirm) crop.onConfirm(result);
}

function buildOrders(){
  if(!S.orders.length) return '<div class="empty">Aucune commande.</div>';
  return S.orders.map(o=>{
    const allDone=(o.items||[]).every(i=>i.done);
    const rows=(o.items||[]).map(item=>{
      const p=S.products.find(x=>x.id===item.id);
      const thumb=p?.photo&&p.photo.startsWith('data:')?`<img src="${p.photo}" style="width:36px;height:36px;object-fit:cover;border-radius:8px;flex-shrink:0">`:
        `<div style="width:36px;height:36px;border-radius:8px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${p?.photo||'📦'}</div>`;
      return `<div class="order-row">
        <div class="chk ${item.done?'done':''}" onclick="toggleDone('${o.id}','${item.id}')">${item.done?'✓':''}</div>
        ${thumb}
        <div style="flex:1;font-size:12px;font-weight:500">${p?.name||'?'}</div>
        <span class="tag tag-red">${item.qty} ctn</span>
      </div>`;
    }).join('');
    return `<div class="card"><div class="card-head">
      <div><div>${o.shopName||'?'}</div><div style="font-size:10px;color:var(--muted);font-weight:400">${o.date||''}</div></div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="tag ${allDone?'tag-green':'tag-gray'}">${allDone?'Traité':'En cours'}</span>
        <button class="btn-sm" onclick="genPDF('${o.id}')">PDF</button>
      </div>
    </div><div class="card-body">${rows}</div></div>`;
  }).join('');
}

window.toggleDone=async function(oid,iid){
  const o=S.orders.find(x=>x.id===oid); if(!o) return;
  const items=(o.items||[]).map(i=>i.id===iid?{...i,done:!i.done}:i);
  await updateDoc(doc(db,'orders',oid),{items});
}

window.genPDF=function(oid){
  const o=S.orders.find(x=>x.id===oid); if(!o) return;
  let h=`<html><head><title>Commande</title><style>body{font-family:Arial;padding:20px}h2{color:#C8102E}table{width:100%;border-collapse:collapse}th{background:#C8102E;color:#fff;padding:8px;text-align:left}td{padding:8px;border-bottom:1px solid #eee}.ok{color:green}</style></head><body>`;
  h+=`<h2>🍁 Canadian & American Market</h2><h3>${o.shopName} — ${o.date}</h3>`;
  h+=`<table><tr><th>Produit</th><th>Département</th><th>Cartons</th><th>✓</th></tr>`;
  (o.items||[]).forEach(item=>{
    const p=S.products.find(x=>x.id===item.id);
    h+=`<tr><td>${p?.name||'?'}</td><td>${p?.dept||''}</td><td>${item.qty}</td><td class="ok">${item.done?'✓':''}</td></tr>`;
  });
  h+=`</table></body></html>`;
  const w=window.open('','_blank'); if(w){w.document.write(h);w.document.close();setTimeout(()=>w.print(),500);}
}

function renderShopContent(){
  const c=document.getElementById('content');
  if(S.showPanel){renderPanel();return;}
  c.innerHTML=S.currentTab===0?buildShopCatalogue():buildCart();
}

function buildShopCatalogue(){
  const ruptures=S.products.filter(p=>p.rupture);
  let alert=ruptures.length?`<div style="background:#fef9c3;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:12px;color:#854d0e;margin-bottom:10px">⚠ ${ruptures.length} produit(s) en rupture à l'entrepôt.</div>`:'';
  let chips=`<div class="dept-scroll"><div class="chip ${!S.filterDept?'active':''}" onclick="shopFilter('')">Tous</div>`;
  S.depts.forEach(d=>chips+=`<div class="chip ${S.filterDept===d.name?'active':''}" onclick="shopFilter('${d.name}')">${d.name}</div>`);
  chips+='</div>';
  const prods=S.products.filter(p=>!p.rupture&&(!S.filterDept||p.dept===S.filterDept));
  if(!prods.length) return alert+chips+'<div class="empty">Aucun produit disponible.</div>';
  let grid='<div class="prod-grid">';
  prods.forEach(p=>{
    const qty=S.cart.find(x=>x.id===p.id)?.qty||0;
    const thumb=p.photo&&p.photo.startsWith('data:')?`<img src="${p.photo}">`:`<div class="prod-emoji">${p.photo||'📦'}</div>`;
    grid+=`<div class="prod-card ${qty>0?'selected':''}" onclick="addToCart('${p.id}')">
      ${qty>0?`<span class="qty-bubble">${qty}</span>`:''}
      <div class="prod-sq">${thumb}</div>
      <div class="prod-info"><div class="prod-name">${p.name}</div><div class="prod-dept">${p.dept||''}</div></div>
    </div>`;
  });
  grid+='</div>';
  return alert+chips+`<div class="card"><div class="card-head">Appuyez pour commander</div><div class="card-body">${grid}</div></div>`;
}

window.shopFilter=function(d){S.filterDept=d;shopTab(0);}
window.addToCart=function(pid){
  const idx=S.cart.findIndex(x=>x.id===pid);
  if(idx>=0) S.cart[idx].qty+=1; else S.cart.push({id:pid,qty:1});
  localStorage.setItem('cam_cart',JSON.stringify(S.cart)); renderShopNav();
}

function buildCart(){
  if(!S.cart.length) return '<div class="empty">Panier vide — appuyez sur les produits.</div>';
  let rows='';
  S.cart.forEach(item=>{
    const p=S.products.find(x=>x.id===item.id); if(!p) return;
    const thumb=p.photo&&p.photo.startsWith('data:')?`<img src="${p.photo}" style="width:40px;height:40px;object-fit:cover;border-radius:8px;flex-shrink:0">`:
      `<div style="width:40px;height:40px;border-radius:8px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${p.photo||'📦'}</div>`;
    rows+=`<div class="order-row">${thumb}
      <div style="flex:1"><div style="font-size:13px;font-weight:600">${p.name}</div><div style="font-size:11px;color:var(--muted)">${p.dept||''}</div></div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
        <span style="font-size:14px;font-weight:700;min-width:20px;text-align:center">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
        <span style="font-size:10px;color:var(--muted)">ctn</span>
      </div>
    </div>`;
  });
  return `<div class="card"><div class="card-head">Ma commande</div><div class="card-body">${rows}</div></div>
    <button class="btn btn-red" onclick="sendOrder()">Envoyer à Rodrigo</button>
    <button class="btn btn-out" onclick="clearCart()">Vider le panier</button>`;
}

window.changeQty=function(pid,delta){
  const idx=S.cart.findIndex(x=>x.id===pid); if(idx<0) return;
  S.cart[idx].qty+=delta; if(S.cart[idx].qty<=0) S.cart.splice(idx,1);
  localStorage.setItem('cam_cart',JSON.stringify(S.cart)); renderShopNav();
}

window.sendOrder=async function(){
  if(!S.cart.length){alert('Panier vide');return;}
  const shop=S.shops.find(s=>s.id===S.currentShopId);
  await addDoc(collection(db,'orders'),{
    shopId:S.currentShopId, shopName:shop?.name||'Magasin',
    items:S.cart.map(x=>({...x,done:false})),
    date:new Date().toLocaleString('fr-CH'), status:'pending', createdAt:serverTimestamp()
  });
  S.cart=[]; localStorage.setItem('cam_cart','[]');
  alert('Commande envoyée à Rodrigo !'); shopTab(0);
}

window.clearCart=function(){ S.cart=[]; localStorage.setItem('cam_cart','[]'); renderShopNav(); }
</script>
</body>
</html>
